        const playerBaiyeEnhanced = this.isHokmaChar() && this.hokmaBaiyeCounter >= 12 && this.transformedEntity === "player";

          dmg = 0;
          b.results.push(`R${r + 1}: \u7EA2${ri}${rBonusTag} vs \u7EFF${gi}${gBonusTag} ${spdLabel} \u2192 \u767D\u591C\u514D\u75AB!${this.hokmaBaiyeCounter >= 12 ? "[\u5F3A\u5316]" : ""}`);
        } else {

          const extra = this.hasDarkRolandDulandar() ? 12 : 6;
          b.gDmg += extra;
          b.results.push(`  [\u7405\u740A\u5DE5\u574A: \u5BF9\u654C\u989D\u5916+${extra}\u4F24\u5BB3]`);
        }
        // 老男孩工坊: deal more damage to enemy, take less damage from this round only
        if (this.hasDarkRolandWeapon("laonanhai")) {

          let gAdded = 0, rReduced = 0;
          if (b.gDmg > gDmgBefore) { b.gDmg += dmgMod; gAdded = dmgMod; }
          if (b.rDmg > rDmgBefore) {
            const canReduce = Math.min(dmgMod, b.rDmg - rDmgBefore);
            b.rDmg -= canReduce;
            rReduced = canReduce;
          }
          if (gAdded > 0 || rReduced > 0) {
            b.results.push(`  [\u8001\u7537\u5B69\u5DE5\u574A: \u654C\u4F24+${gAdded}, \u81EA\u4F24-${rReduced}]`);
          }

        if (this.darkRolandDodgeDice > 0 && !this.darkRolandDodgeUsed && gi > ri) {
          const diff = gi - ri;
          if (this.darkRolandDodgeDice > diff) {
            const roundRDmg = b.rDmg - rDmgBefore;
            b.rDmg = Math.max(0, b.rDmg - roundRDmg);
            this.darkRolandDodgeUsed = true;
            b.results.push(`  [\u5361\u8389\u65AF\u5854\u5DE5\u4F5C\u5BA4: \u95EA\u907F\u9AB0\u5B50${this.darkRolandDodgeDice} > \u5DEE\u503C${diff}, \u5B8C\u5168\u95EA\u907F!]`);

        if (crimsonWasIntercepted) {

          const opponentAtk = crimsonIsRed ? b.gAtk[r] : b.rAtk[r];
          const counterVal = b.crimsonCounterDice;
          if (counterVal > opponentAtk) {

            if (crimsonIsRed) {
              b.gDmg += diff;
            } else {

            }
            b.results.push(`R${r + 1}: \u6BB7\u7EA2\u53CD\u51FB! ${counterVal} vs ${opponentAtk} \u2192 \u53CD\u51FB${diff}\u4F24\u5BB3`);
          } else if (opponentAtk > counterVal) {
            const diff = opponentAtk - counterVal;
            if (crimsonIsRed) {
              b.rDmg += diff;
            } else {
              b.gDmg += diff;
            }
            b.results.push(`R${r + 1}: \u6BB7\u7EA2\u53CD\u51FB! ${counterVal} vs ${opponentAtk} \u2192 \u53CD\u51FB\u5931\u8D25 \u53D7\u4F24${diff}`);
          } else {
            b.results.push(`R${r + 1}: \u6BB7\u7EA2\u53CD\u51FB! ${counterVal} vs ${opponentAtk} \u2192 \u53CD\u51FB\u5E73\u5C40`);

    updateBattle(now) {
      const b = this.battle;
      if (b.phase === "attack") {
        const elapsed = now - b.timer;
        if (b.atkShake > 0) b.atkShake *= 0.92;
        if (b.atkShake < 0.3) b.atkShake = 0;
        for (let i = b.atkParticles.length - 1; i >= 0; i--) {
          const p = b.atkParticles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.15;
          p.life -= 1;
          if (p.life <= 0) b.atkParticles.splice(i, 1);
        }
        for (let i = b.atkTrailsR.length - 1; i >= 0; i--) {
          b.atkTrailsR[i].age++;
          if (b.atkTrailsR[i].age > 12) b.atkTrailsR.splice(i, 1);
        }
        for (let i = b.atkTrailsG.length - 1; i >= 0; i--) {
          b.atkTrailsG[i].age++;
          if (b.atkTrailsG[i].age > 12) b.atkTrailsG.splice(i, 1);
        }
        if (b.atkLoserVel && b.atkLoserPos) {
          b.atkLoserPos.x += b.atkLoserVel.x;

        const spinEnd = ATK_SPIN_DUR;
        const revealEnd = spinEnd + ATK_REVEAL_DUR;
        const bonusEnd = revealEnd + ATK_BONUS_DUR;
        const flyEnd = bonusEnd + ATK_FLY_DUR;
        const impactEnd = flyEnd + ATK_IMPACT_DUR;
        if (elapsed >= flyEnd && !b.atkImpactDone) {
          b.atkImpactDone = true;
          b.atkShake = 14;
          const baiyeUpd = this.baiyeCollectCount >= WHITE_CIRCLE_MAX && this.transformedEntity !== null;
          const cx = W / 2, cy = battleBaseY(b.angerBattle, baiyeUpd) + 140;

          for (let i = 0; i < 40; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 6;
            b.atkParticles.push({
              x: cx + rand(-20, 20),
              y: cy + rand(-15, 15),
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed - 2,
              life: 30 + rand(0, 20),
              color: colors[rand(0, colors.length - 1)],
              size: 2 + Math.random() * 4
            });
          }
          const r = b.round;
          const loserSide = b.rFinal[r] < b.gFinal[r] ? "red" : b.gFinal[r] < b.rFinal[r] ? "green" : null;
          if (loserSide) {
            const edgeX = loserSide === "red" ? W / 2 - 440 : W / 2 + 440;
            const framesToEdge = 20;
            b.atkLoserVel = { x: (edgeX - W / 2) / framesToEdge, y: -1.5 + Math.random() * 1 };
            b.atkLoserPos = { x: W / 2, y: cy };
          }
        }
        if (elapsed >= ATK_TOTAL_DUR) {
          // Save pre-resolve damage for animation
          b.resolveRDmgPre = b.rDmg;
          b.resolveGDmgPre = b.gDmg;
          b.resolveWeaponEffects = [];
          this.resolveAtkRound(b.round);
          if (b.round === 0) {
            b.round = 1;
            b.timer = now;
            this.rollAtk(1);
            b.atkParticles = [];
            b.atkTrailsR = [];
            b.atkTrailsG = [];
            b.atkShake = 0;
            b.atkLoserVel = null;
            b.atkLoserPos = null;
            b.atkImpactDone = false;
          } else {
            // Save pre-round-1 damage (resolveRDmgPre was for round 0, reset now)
            const preRDmg = b.rDmg;
            const preGDmg = b.gDmg;
            this.resolveAtkRound(b.round);
            // Collect weapon effect deltas from this round
            const rDelta = b.rDmg - preRDmg;
            const gDelta = b.gDmg - preGDmg;
            if (this.rolandHiddenForm && this.selectedChar === 0) {
              if (this.hasDarkRolandWeapon("langya") && gDelta > 0) {
                b.resolveWeaponEffects.push({ text: `\u7405\u740A\u5DE5\u574A \u989D\u5916+${gDelta}`, color: "#FFD700", side: "green" });
              }
              if (this.hasDarkRolandWeapon("laonanhai")) {
                if (gDelta > 0) b.resolveWeaponEffects.push({ text: `\u8001\u7537\u5B69\u5DE5\u574A \u654C\u4F24+${gDelta}`, color: "#FFD700", side: "green" });
                if (rDelta < 0) b.resolveWeaponEffects.push({ text: `\u8001\u7537\u5B69\u5DE5\u574A \u81EA\u4F24${rDelta}`, color: "#88ff88", side: "red" });
              }
              if (this.darkRolandDodgeDice > 0 && !this.darkRolandDodgeUsed) {
                // Check if dodge was used this round (enemy won but player took no extra damage)
                const round1EnemyWon = b.rFinal[1] < b.gFinal[1];
                if (round1EnemyWon && b.rDmg <= preRDmg) {
                  b.resolveWeaponEffects.push({ text: `\u5361\u8389\u65AF\u5854\u5DE5\u4F5C\u5BA4 \u95EA\u907F!`, color: "#00ffcc", side: "red" });
                }
              }
            }
            b.phase = "resolve";
            b.resolveAnimStart = performance.now();
            if (this.isHokmaChar() && this.hokmaMartyrUsed && this.hasHokmaEffect("martyr")) {
              if (b.rDmg > b.gDmg) {
                b.gDmg += 10;
              } else if (b.gDmg > b.rDmg) {
                b.rDmg += 5;
              }
            }
          }
        }
      }
    }
    endBattle() {
      const b = this.battle;
      if (this.removedEnemies.has(b.eIdx)) {
        this.battle = null;
        this.phase = "play";
        this.lastBattleEnd = performance.now();
        return;
      }
      let mult = b.angerBattle ? 2 : 1;
      let finalRDmg = b.rDmg;
      let finalGDmg = b.gDmg;
      const dmgReduce = CHARS[this.selectedChar].damageReduce || 0;
      if (dmgReduce > 0) {
        finalRDmg = Math.max(0, finalRDmg - dmgReduce);
      }
      if (this.apocalypseCompleted && this.apocalypseForm !== null && b.disciplineSelfDmg > 0) {
        if (this.apocalypseForm === "player") {
          finalRDmg += b.disciplineSelfDmg;
        } else if (typeof this.apocalypseForm === "number" && this.apocalypseForm === b.eIdx) {
          finalGDmg += b.disciplineSelfDmg;
        }
      }
      let crimsonLost = false;
      if (b.crimsonSide) {
        if (b.crimsonSide === "red" && finalGDmg > finalRDmg) crimsonLost = true;
        if (b.crimsonSide === "green" && finalRDmg > finalGDmg) crimsonLost = true;
      }
      if (this.hokmaChimeTriggered) {
        finalGDmg = 999;
        this.score = Math.max(0, this.score - this.score);
        this.showMessage("\u{1F514} \u7B2C\u5341\u4E09\u58F0\u949F\u54CD! \u76F4\u63A5\u80DC\u5229, \u5206\u6570\u6E05\u96F6!", 3e3);
      }
      if (this.isHokmaChar() && this.hokmaBaptismUsed && this.hasHokmaEffect("baptism")) {
        finalRDmg = Math.max(0, finalRDmg - 6);
      }
      if (this.isHokmaChar() && this.hokmaBaptismUsedThisTurn && this.hasHokmaEffect("advent")) {
        if (finalRDmg < 6) {
          finalRDmg = 0;
        }
      }
      if (this.binahSinAutoLose) {
        finalGDmg = 999;
        this.binahSinAutoLose = false;

      }
      // Dark Roland: score changes doubled
      if (this.rolandHiddenForm && this.selectedChar === 0) {
        mult *= 2;
      }
      if (finalGDmg > finalRDmg) {
        this.score = Math.max(0, this.score - 5 * mult);
      } else if (finalRDmg > finalGDmg) {
        let scoreGain = 5 * mult;
        const preyBlock = this.isGeburaEmotionChar() && this.hasGeburaEmotion("prey") && this.geburaBonusesActive && this.preyMarkedEnemy.has(b.eIdx);
        if (preyBlock) scoreGain = 0;
        const enemyWinReduce = CHARS[this.selectedChar].enemyWinScoreReduce || 0;
        if (enemyWinReduce > 0) scoreGain = Math.ceil(scoreGain * (1 - enemyWinReduce));
        this.score += scoreGain;
        if (scoreGain > 0) {
          this.chesedOnScoreGain();
          this.hokmaOnScoreGain();
        }
        const healAmt = CHARS[this.selectedChar].battleWinHeal || 0;
        if (healAmt > 0) this.score += healAmt;
      }
      if (this.selectedChar === 5 && CHARS[this.selectedChar].emotionChar && finalRDmg > finalGDmg) {
        this.gainNextEmotion();
        if (!this.geburaUnlocked && this.emotions.length >= 5) {

          this.showMessage("\u8BED\u8A00\u5C42\u53F8\u4E66 gebura \u5DF2\u89E3\u9501!", 3e3);
        }
      }
      if (this.selectedChar === 5 && CHARS[this.selectedChar].emotionChar && finalGDmg > finalRDmg) {
        this.emotionBonusesActive = false;
      }
      if (this.isGeburaEmotionChar() && finalGDmg > finalRDmg) {

      if (this.isGeburaEmotionChar() && finalRDmg > finalGDmg) {

      }
      if (this.isGeburaEmotionChar() && this.hasGeburaEmotion("prey") && this.preyMarkedEnemy.has(b.eIdx) && finalGDmg > finalRDmg && !this.preyJustMarked) {
        this.score = Math.max(0, this.score - 10);
        this.preyMarkedEnemy.delete(b.eIdx);
      }
      if (this.isGeburaEmotionChar() && this.hasGeburaEmotion("corpse") && finalGDmg > finalRDmg && this.corpseKillCount < 2 && !this.removedEnemies.has(b.eIdx)) {
        this.corpseKillCount++;
        this.corpseBonusAtk += 2;
        this.corpseBonusDef += 2;
        this.removedEnemies.add(b.eIdx);
        this.enemies[b.eIdx] = null;
        this.preyMarkedEnemy.delete(b.eIdx);
        this.showMessage(`\u5C38\u5C71: \u51FB\u8D25\u654C\u4EBA! \u62FC\u70B9+${this.corpseBonusAtk}, \u53D7\u4F24-${this.corpseBonusDef} (\u5269\u4F59${2 - this.corpseKillCount}\u6B21)`, 2500);

      if (this.crimsonForm === "player" && this.crimsonCounter < CRIMSON_COUNTER_MAX && finalGDmg > finalRDmg) {

          this.showCrimsonSubtitle("\u597D\u597D\u770B\u7740E.G.O\u8BE5\u600E\u4E48\u7528\uFF01\uFF01\uFF01\uFF01\uFF01", 2e3);
        }
      }
      if (this.angerActive) {

      }
      const playerWon = finalGDmg > finalRDmg;

      if (!this.removedEnemies.has(b.eIdx) && !isCrimsonEnemy) {
        this.enemies[b.eIdx] = this.spawnEnemy();
      }
      this.battle = null;
      this.phase = "play";
      this.lastBattleEnd = performance.now();

      this.hokmaOnBattleEnd();
      this.binahOnBattleEnd();
      if (crimsonLost && this.crimsonForm !== null && this.crimsonCounter >= CRIMSON_COUNTER_MAX) {
        this.performCrimsonTeleport();
      }
    }
    performCrimsonTeleport() {
      const allUnits = [];
      if (this.crimsonForm !== "player") {
        allUnits.push({ x: this.player.x, y: this.player.y });
      }
      for (let i = 0; i < this.enemies.length; i++) {
        if (this.enemies[i] && !this.removedEnemies.has(i)) {
          if (this.crimsonForm === "player" || this.crimsonForm !== i) {
            allUnits.push({ x: this.enemies[i].x, y: this.enemies[i].y });
          }
        }
      }
      if (allUnits.length === 0) return;
      const targetUnit = allUnits[rand(0, allUnits.length - 1)];
      const dist = rand(5, 10);
      for (let tries = 0; tries < 300; tries++) {
        const dx = rand(-dist, dist);
        const dy = rand(-dist, dist);
        if (Math.abs(dx) + Math.abs(dy) < 3 || Math.abs(dx) + Math.abs(dy) > dist + 2) continue;
        const tx = targetUnit.x + dx;
        const ty = targetUnit.y + dy;
        if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) continue;
        const cell = this.maze[ty][tx];
        if (cell.walls[0] || cell.walls[1] || cell.walls[2] || cell.walls[3]) continue;
        if (this.crimsonForm === "player") {
          this.player.x = tx;
          this.player.y = ty;
          this.player.prevX = tx;
          this.player.prevY = ty;
        } else if (typeof this.crimsonForm === "number") {
          const e = this.enemies[this.crimsonForm];
          if (e) {
            e.x = tx;
            e.y = ty;
            e.prevX = tx;
            e.prevY = ty;
            e.moveT = performance.now();
          }
        }
        this.showCrimsonSubtitle("\u9677\u9635\u4E4B\u5FD7\uFF01", 1500);
        return;
      }
    }

      this.trail = this.trail.filter((t) => now - t.t < 600);
      this.enemyTrails = this.enemyTrails.filter((t) => now - t.t < 400);
      this.updateGoldParticles(now);
    }
    // ============================================================
    // RENDERING
    // ============================================================
    epos(e, now, ms) {
      const t = clamp((now - e.moveT) / ms, 0, 1);
      return { x: lerp(e.prevX, e.x, t) * CS + OX + CS / 2, y: lerp(e.prevY, e.y, t) * CS + OY + CS / 2 };
    }
    render(now) {
      if (this.phase === "start") {
        this.renderStartPage(now);
        return;
      }
      if (this.phase === "select") {
        this.renderCharSelect(now);
        return;
      }
      if (this.phase === "detail") {
        this.renderDetail(now);
        return;
      }
      const ctx = this.ctx;
      ctx.imageSmoothingEnabled = true;
      ctx.fillStyle = CLR.bg;
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = "rgba(200,162,78,0.03)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = 0; x < W; x += CS) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
      }
      for (let y = 0; y < H; y += CS) {
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
      }
      ctx.stroke();
      for (let y = 0; y < ROWS; y++)
        for (let x = 0; x < COLS; x++) {
          const isAlt = (x + y) % 2 === 0;
          ctx.fillStyle = isAlt ? CLR.floor1 : CLR.floor2;
          ctx.fillRect(OX + x * CS, OY + y * CS, CS, CS);
          if (isAlt) {
            ctx.fillStyle = "rgba(200,162,78,0.012)";
            const seed = x * 73 + y * 137;
            for (let d = 0; d < 3; d++) {
              const dx = seed * (d + 1) * 17 % 30 + 5;
              const dy = seed * (d + 1) * 31 % 30 + 5;
              ctx.fillRect(OX + x * CS + dx, OY + y * CS + dy, 2, 2);
            }
          }
        }
      const exitPulse = 0.5 + 0.5 * Math.sin(now / 400);
      ctx.font = `bold 16px ${PF}`;
      ctx.textAlign = "center";
      ctx.save();
      ctx.fillStyle = CLR.hud;
      ctx.shadowColor = CLR.hud;
      ctx.shadowBlur = 6;
      ctx.fillText("\u25BC ENTER \u25BC", OX + CS / 2, OY - 12);
      ctx.fillStyle = "#c8a24e";
      ctx.shadowColor = "#FFD700";
      ctx.shadowBlur = 10 + 6 * exitPulse;
      ctx.fillText("\u25BC exit \u25BC", OX + (COLS - 1) * CS + CS / 2, OY + ROWS * CS + 16);
      ctx.restore();
      this.renderItems(now);
      this.renderExit(now);
      this.renderApocalypseItem(now);
      this.renderSubBosses(now);
      this.renderCrimsonItem(now);
      this.renderNetzachJar(now);
      for (const t of this.trail) {
        const a = clamp(1 - (now - t.t) / 600, 0, 1) * 0.2;
        ctx.fillStyle = `rgba(196,30,58,${a})`;
        ctx.fillRect(OX + t.x * CS + 6, OY + t.y * CS + 6, CS - 12, CS - 12);
      }
      ctx.save();
      ctx.strokeStyle = CLR.wall;
      ctx.lineWidth = 2;
      ctx.shadowColor = CLR.wall;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      for (let y = 0; y < ROWS; y++)
        for (let x = 0; x < COLS; x++) {
          const c = this.maze[y][x], px = OX + x * CS, py = OY + y * CS;
          if (c.walls[0]) {
            ctx.moveTo(px, py);
            ctx.lineTo(px + CS, py);
          }
          if (c.walls[1]) {
            ctx.moveTo(px + CS, py);
            ctx.lineTo(px + CS, py + CS);
          }
          if (c.walls[2]) {
            ctx.moveTo(px, py + CS);
            ctx.lineTo(px + CS, py + CS);
          }
          if (c.walls[3]) {
            ctx.moveTo(px, py);
            ctx.lineTo(px, py + CS);
          }
        }
      ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.strokeStyle = CLR.wall2;
      ctx.lineWidth = 2;
      ctx.shadowColor = CLR.wall2;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(OX, OY);
      ctx.lineTo(OX + CS, OY);
      ctx.moveTo(OX + CS, OY);
      ctx.lineTo(OX + COLS * CS, OY);
      ctx.moveTo(OX + COLS * CS, OY);
      ctx.lineTo(OX + COLS * CS, OY + ROWS * CS);
      ctx.moveTo(OX + COLS * CS, OY + ROWS * CS);
      ctx.lineTo(OX + (COLS - 1) * CS, OY + ROWS * CS);
      ctx.moveTo(OX + (COLS - 1) * CS, OY + ROWS * CS);
      ctx.lineTo(OX, OY + ROWS * CS);
      ctx.moveTo(OX, OY + ROWS * CS);
      ctx.lineTo(OX, OY);
      ctx.stroke();
      ctx.restore();
      this.renderEnemyTrails(now);
      const eMs = this.enemyMs;
      for (let ei = 0; ei < this.enemies.length; ei++) {
        const e = this.enemies[ei];
        if (!e) continue;
        const isTransformed = this.transformedEntity === ei;
        if (this.apocalypseForm === ei) {
          this.renderApocalypseEntity(now, e, this.apocalypseCompleted ? ENEMY_MS : eMs);
          continue;
        }
        if (this.crimsonForm === ei) {
          this.renderCrimsonEntity(now, e, eMs);
          continue;
        }
        if (isTransformed) {
          this.renderTransformedEntity(now, e, eMs);
          continue;
        }
        const p = this.epos(e, now, eMs);
        ctx.save();
        if (this.angerActive) {
          ctx.shadowColor = CLR.angerG;
          ctx.shadowBlur = e.chasing ? 24 : 16;
          ctx.fillStyle = CLR.anger;
          ctx.beginPath();
          ctx.arc(p.x, p.y, CS / 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = "#3a1a0a";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(p.x - 9, p.y - 5);
          ctx.lineTo(p.x - 3, p.y - 9);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(p.x + 9, p.y - 5);
          ctx.lineTo(p.x + 3, p.y - 9);
          ctx.stroke();
          ctx.fillStyle = "#4a0000";
          ctx.fillRect(p.x - 6, p.y - 1, 3, 3);
          ctx.fillRect(p.x + 4, p.y - 1, 3, 3);
          ctx.strokeStyle = "#3a1a0a";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(p.x, p.y + 8, 5, 1.2 * Math.PI, 1.8 * Math.PI);
          ctx.stroke();
        } else {
          ctx.shadowColor = CLR.enemyG;
          ctx.shadowBlur = e.chasing ? 20 : 12;
          ctx.fillStyle = CLR.enemy;
          ctx.beginPath();
          ctx.arc(p.x, p.y, CS / 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = CLR.enemyHi;
          ctx.beginPath();
          ctx.arc(p.x - 3, p.y - 3, 4, 0, Math.PI * 2);
          ctx.fill();
          if (e.chasing || CHARS[this.selectedChar].enemyAlwaysVisible) {
            ctx.strokeStyle = "#8b0000";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(p.x, p.y, CS / 3 + 4, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
        ctx.restore();
        if (this.preyMarkedEnemy.has(ei)) {
          ctx.save();
          ctx.strokeStyle = "#ff3333";
          ctx.lineWidth = 2;
          ctx.shadowColor = "#ff3333";
          ctx.shadowBlur = 6;
          const cr = CS / 3 + 6;
          ctx.beginPath();
          ctx.moveTo(p.x - cr, p.y);
          ctx.lineTo(p.x - cr / 3, p.y);
          ctx.moveTo(p.x + cr / 3, p.y);
          ctx.lineTo(p.x + cr, p.y);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(p.x, p.y - cr);
          ctx.lineTo(p.x, p.y - cr / 3);
          ctx.moveTo(p.x, p.y + cr / 3);
          ctx.lineTo(p.x, p.y + cr);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(p.x, p.y, cr / 2, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }
      if (this.apocalypseForm === "player") {
        this.renderApocalypsePlayer(now);
      } else if (this.crimsonForm === "player") {
        this.renderCrimsonPlayer(now);
      } else if (this.transformedEntity === "player") {
        this.renderTransformedPlayer(now);
      } else {
        const p = this.epos(this.player, now, this.getPlayerMs());
        this.drawCharacter(ctx, p.x, p.y, CS / 3, this.selectedChar, now);
      }
      this.renderWhiteCircles(now);
      this.renderWhiteTriangle(now);
      this.renderBaiyeItem(now);
      this.renderHokmaGuardians(now);
      ctx.fillStyle = "rgba(0,0,0,0.015)";
      for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
      const vg = ctx.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, W * 0.72);
      vg.addColorStop(0, "rgba(0,0,0,0)");
      vg.addColorStop(0.7, "rgba(3,2,1,0.3)");
      vg.addColorStop(1, "rgba(5,4,3,0.65)");
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, H);
      const candle = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.5);
      candle.addColorStop(0, "rgba(200,162,78,0.015)");
      candle.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = candle;
      ctx.fillRect(0, 0, W, H);
      if (this.angerActive) {
        const pulse = 0.5 + 0.5 * Math.sin(now / 300);
        ctx.fillStyle = `rgba(139,0,0,${0.04 + 0.05 * pulse})`;
        ctx.fillRect(0, 0, W, H);
        ctx.save();
        ctx.strokeStyle = `rgba(200,0,0,${0.3 + 0.4 * pulse})`;
        ctx.lineWidth = 3;
        ctx.shadowColor = "#8b0000";
        ctx.shadowBlur = 15 + 10 * pulse;
        ctx.strokeRect(2, 2, W - 4, H - 4);
        ctx.restore();
      }
      if (this.transformedEntity !== null) {
        const pulse = 0.5 + 0.5 * Math.sin(now / 400);
        ctx.fillStyle = `rgba(200,180,120,${0.015 + 0.025 * pulse})`;
        ctx.fillRect(0, 0, W, H);
      }
      if (this.crimsonForm !== null) {
        const pulse = 0.5 + 0.5 * Math.sin(now / 200);
        ctx.fillStyle = `rgba(139,0,0,${0.015 + 0.035 * pulse})`;
        ctx.fillRect(0, 0, W, H);
      }
      this.renderGoldParticles();
      this.renderHUD(now);
      this.renderCtrlPanel(now);
      this.renderBaiyeMessage(now);
      this.renderGoldenMessage(now);
      this.renderBaiyeCounter(now);
      this.renderApocalypseCounter(now);
      this.renderCrimsonSubtitle(now);
      this.renderCrimsonCounter(now);
      this.renderEmotionCounter(now);
      this.renderEmotionAnim(now);
      this.renderEmotionHUD(now);
      this.renderGeburaEmotionAnim(now);
      this.renderGeburaEmotionHUD(now);
      this.renderChesedTrustAnim(now);
      this.renderChesedCompanionMarkers(now);
      this.renderChesedTrustHUD(now);
      this.renderChesedFlash(now);
      this.renderHokmaAnim(now);
      this.renderBinahAnim(now);
      this.renderBinahFlash(now);
      this.renderBinahLampMark(now);
      this.renderBinahSinMarks(now);
      if (this.rolandHiddenForm && this.selectedChar === 0 && this.phase === "play") this.renderDarkRolandSmoke(now);
      this.renderRainbowOverlay(now);
      if (this.phase === "battle") this.renderBattle(now);
      if (this.phase === "won" || this.phase === "lost") this.renderGameOver(now);
      if (this.phase === "curtain") this.renderCurtain(now);
      this.renderGameInfoPanel(now);
      this.renderCheatPanel();
      if (this.effectsPanelOpen) this.renderEffectsPanel(now);
    }
    // ---- Sub-renderers ----
    renderItems(now) {
      const ctx = this.ctx;
      const pulse = 0.5 + 0.5 * Math.sin(now / 350);
      for (const it of this.items) {
        if (!it.alive) continue;
        const cx = OX + it.x * CS + CS / 2, cy = OY + it.y * CS + CS / 2;
        ctx.save();
        ctx.shadowColor = CLR.itemG;
        ctx.shadowBlur = 6 + 6 * pulse;
        ctx.fillStyle = CLR.item;
        const s = CS / 5;
        ctx.beginPath();
        ctx.moveTo(cx, cy - s);
        ctx.lineTo(cx + s, cy);
        ctx.lineTo(cx, cy + s);
        ctx.lineTo(cx - s, cy);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }
    renderExit(now) {
      const ctx = this.ctx;
      const ex = OX + (COLS - 1) * CS, ey = OY + (ROWS - 1) * CS;
      const cx = ex + CS / 2, cy = ey + CS / 2;
      const pulse = 0.5 + 0.5 * Math.sin(now / 400);
      if (CHARS[this.selectedChar].showExitAlways) {
        ctx.save();
        ctx.strokeStyle = "#ffd700";
        ctx.lineWidth = 1.5;
        ctx.shadowColor = "#ffd700";
        ctx.shadowBlur = 6;
        ctx.setLineDash([4, 3]);
        ctx.strokeRect(ex + 4, ey + 4, CS - 8, CS - 8);
        ctx.setLineDash([]);
        ctx.restore();
      }
      ctx.save();
      ctx.strokeStyle = "#FFD700";
      ctx.lineWidth = 2;
      ctx.shadowColor = "#FFD700";
      ctx.shadowBlur = 18 + 12 * pulse;
      const ringSz = CS / 2 - 2 + 2 * pulse;
      ctx.beginPath();
      ctx.moveTo(cx, cy - ringSz);
      ctx.lineTo(cx + ringSz, cy);
      ctx.lineTo(cx, cy + ringSz);
      ctx.lineTo(cx - ringSz, cy);
      ctx.closePath();
      ctx.stroke();
      ctx.fillStyle = "#c8a24e";
      ctx.shadowBlur = 10 + 6 * pulse;
      const innerSz = ringSz - 4;
      ctx.beginPath();
      ctx.moveTo(cx, cy - innerSz);
      ctx.lineTo(cx + innerSz, cy);
      ctx.lineTo(cx, cy + innerSz);
      ctx.lineTo(cx - innerSz, cy);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.shadowColor = "#FFD700";
      ctx.shadowBlur = 14 + 10 * pulse;
      ctx.font = `bold 12px ${PF}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#1a0e08";
      ctx.fillText("exit", cx, cy);
      ctx.restore();
    }
    // ---- 白夜 Item Rendering ----
    renderBaiyeItem(now) {
      if (!this.baiyeItem || !this.baiyeItem.alive) return;
      const ctx = this.ctx;
      const bi = this.baiyeItem;
      const cx = OX + bi.x * CS + CS / 2, cy = OY + bi.y * CS + CS / 2;
      const pulse = 0.5 + 0.5 * Math.sin(now / 300);
      ctx.save();
      ctx.shadowColor = `rgba(255,255,255,${0.5 + 0.5 * pulse})`;
      ctx.shadowBlur = 12 + 10 * pulse;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, CS / 2);
      grad.addColorStop(0, `rgba(255,255,255,${0.8 + 0.2 * pulse})`);
      grad.addColorStop(0.5, `rgba(255,100,100,${0.6 + 0.3 * pulse})`);
      grad.addColorStop(1, `rgba(200,0,0,${0.3 + 0.2 * pulse})`);
      ctx.fillStyle = grad;
      ctx.fillRect(OX + bi.x * CS + 2, OY + bi.y * CS + 2, CS - 4, CS - 4);
      if (this.baiyeImg && this.baiyeImg.complete && this.baiyeImg.naturalWidth > 0) {
        ctx.drawImage(this.baiyeImg, OX + bi.x * CS + 3, OY + bi.y * CS + 3, CS - 6, CS - 6);
      } else {
        ctx.shadowBlur = 0;
        ctx.font = `bold 7px ${PF}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#fff";
        ctx.fillText("\u767D\u591C", cx, cy);
      }
      ctx.restore();
    }
    // ---- 终末鸟 Item Rendering ----
    renderApocalypseItem(now) {
      if (!this.apocalypseItem || !this.apocalypseItem.alive) return;
      const ctx = this.ctx;
      const ai = this.apocalypseItem;
      const cx = OX + ai.x * CS + CS / 2, cy = OY + ai.y * CS + CS / 2;
      const pulse = 0.5 + 0.5 * Math.sin(now / 250);
      ctx.save();
      ctx.shadowColor = "rgba(255,215,0," + (0.5 + 0.5 * pulse) + ")";
      ctx.shadowBlur = 14 + 10 * pulse;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, CS / 2);
      grad.addColorStop(0, "rgba(255,215,0," + (0.8 + 0.2 * pulse) + ")");
      grad.addColorStop(0.5, "rgba(180,120,0," + (0.6 + 0.3 * pulse) + ")");
      grad.addColorStop(1, "rgba(100,50,0," + (0.3 + 0.2 * pulse) + ")");
      ctx.fillStyle = grad;
      ctx.fillRect(OX + ai.x * CS + 2, OY + ai.y * CS + 2, CS - 4, CS - 4);
      if (this.apocalypseImg && this.apocalypseImg.complete && this.apocalypseImg.naturalWidth > 0) {
        ctx.drawImage(this.apocalypseImg, OX + ai.x * CS + 4, OY + ai.y * CS + 4, CS - 8, CS - 8);
      } else {
        ctx.shadowBlur = 0;
        ctx.font = "bold 6px " + PF;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#FFD700";
        ctx.fillText("\u7EC8\u672B\u9E1F", cx, cy);
      }
      ctx.restore();
    }
    // ---- Sub-Bosses Rendering ----
    renderSubBosses(now) {
      const ctx = this.ctx;
      for (const sb of this.subBosses) {
        const cx = OX + sb.x * CS + CS / 2, cy = OY + sb.y * CS + CS / 2;
        const pulse = 0.5 + 0.5 * Math.sin(now / 350);
        ctx.save();
        if (!sb.touched) {
          ctx.shadowColor = "rgba(255,215,0," + (0.4 + 0.4 * pulse) + ")";
          ctx.shadowBlur = 10 + 8 * pulse;
        } else {
          ctx.shadowColor = "rgba(100,100,100,0.3)";
          ctx.shadowBlur = 4;
        }
        if (sb.img && sb.img.complete && sb.img.naturalWidth > 0) {
          ctx.globalAlpha = sb.touched ? 0.5 : 1;
          ctx.drawImage(sb.img, OX + sb.x * CS + 2, OY + sb.y * CS + 2, CS - 4, CS - 4);
        } else {
          ctx.fillStyle = sb.touched ? "rgba(100,100,100,0.4)" : "rgba(255,215,0," + (0.6 + 0.3 * pulse) + ")";
          ctx.fillRect(OX + sb.x * CS + 4, OY + sb.y * CS + 4, CS - 8, CS - 8);
          ctx.shadowBlur = 0;
          ctx.font = "bold 6px " + PF;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillStyle = sb.touched ? "#605040" : "#FFD700";
          ctx.fillText(sb.name, cx, cy);
        }
        ctx.shadowBlur = 0;
        ctx.globalAlpha = sb.touched ? 0.4 : 0.8;
        ctx.font = "5px " + PF;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillStyle = sb.touched ? "#6a5a40" : "#FFD700";
        ctx.fillText(sb.name, cx, OY + sb.y * CS + CS + 2);
        ctx.restore();
      }
    }
    // ---- White Circles Rendering ----
    renderWhiteCircles(now) {
      const ctx = this.ctx;
      for (const wc of this.whiteCircles) {
        if (!wc.alive) continue;
        const cx = OX + wc.x * CS + CS / 2, cy = OY + wc.y * CS + CS / 2;
        const pulse = 0.5 + 0.5 * Math.sin(now / 400);
        ctx.save();
        ctx.shadowColor = `rgba(255,255,255,${0.4 + 0.4 * pulse})`;
        ctx.shadowBlur = 8 + 8 * pulse;
        ctx.fillStyle = `rgba(255,255,255,${0.6 + 0.3 * pulse})`;
        ctx.beginPath();
        ctx.arc(cx, cy, CS / 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = `rgba(255,255,255,${0.2 + 0.2 * pulse})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, CS / 3.5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }
    // ---- White Triangle Rendering ----
    renderWhiteTriangle(now) {
      if (!this.whiteTriangle || !this.whiteTriangle.alive) return;
      const ctx = this.ctx;
      const wt = this.whiteTriangle;
      const t = clamp((now - wt.moveT) / WHITE_TRIANGLE_MS, 0, 1);
      const px = lerp(wt.prevX, wt.x, t) * CS + OX + CS / 2;
      const py = lerp(wt.prevY, wt.y, t) * CS + OY + CS / 2;
      const pulse = 0.5 + 0.5 * Math.sin(now / 350);
      const rot = now / 2e3 * Math.PI * 2;
      const size = CS / 3;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(rot);
      ctx.shadowColor = `rgba(255,255,255,${0.5 + 0.5 * pulse})`;
      ctx.shadowBlur = 12 + 8 * pulse;
      ctx.fillStyle = `rgba(255,255,255,${0.8 + 0.2 * pulse})`;
      ctx.strokeStyle = `rgba(200,200,255,${0.6 + 0.3 * pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.866, size * 0.5);
      ctx.lineTo(-size * 0.866, size * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
    // ---- Transformed Entity Rendering (Enemy) ----
    renderTransformedEntity(now, e, ms) {
      const ctx = this.ctx;
      const p = this.epos(e, now, ms);
      const pulse = 0.5 + 0.5 * Math.sin(now / 300);
      ctx.save();
      ctx.shadowColor = `rgba(255,255,255,${0.5 + 0.5 * pulse})`;
      ctx.shadowBlur = 16 + 8 * pulse;
      if (this.baiyeImg && this.baiyeImg.complete && this.baiyeImg.naturalWidth > 0) {
        ctx.drawImage(this.baiyeImg, p.x - CS / 2.5, p.y - CS / 2.5, CS / 1.25, CS / 1.25);
      } else {
        ctx.fillStyle = `rgba(255,200,200,${0.7 + 0.3 * pulse})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, CS / 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.font = `bold 6px ${PF}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#fff";
        ctx.fillText("\u767D\u591C", p.x, p.y);
      }
      ctx.shadowBlur = 0;
      ctx.strokeStyle = `rgba(255,255,255,${0.2 + 0.3 * pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, CS / 2.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    // ---- Transformed Player Rendering ----
    renderTransformedPlayer(now) {
      const ctx = this.ctx;
      const p = this.epos(this.player, now, PLAYER_MS);
      const pulse = 0.5 + 0.5 * Math.sin(now / 300);
      ctx.save();
      ctx.shadowColor = `rgba(255,255,255,${0.5 + 0.5 * pulse})`;
      ctx.shadowBlur = 18 + 10 * pulse;
      if (this.baiyeImg && this.baiyeImg.complete && this.baiyeImg.naturalWidth > 0) {
        ctx.drawImage(this.baiyeImg, p.x - CS / 2.5, p.y - CS / 2.5, CS / 1.25, CS / 1.25);
      } else {
        ctx.fillStyle = `rgba(255,200,200,${0.7 + 0.3 * pulse})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, CS / 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.font = `bold 6px ${PF}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#fff";
        ctx.fillText("\u767D\u591C", p.x, p.y);
      }
      ctx.shadowBlur = 0;
      ctx.strokeStyle = `rgba(255,255,255,${0.2 + 0.3 * pulse})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, CS / 2.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    // ---- 终末鸟 Transformed Player Rendering ----
    renderApocalypsePlayer(now) {
      const ctx = this.ctx;
      const p = this.epos(this.player, now, PLAYER_MS);
      const pulse = 0.5 + 0.5 * Math.sin(now / 250);
      ctx.save();
      ctx.shadowColor = "rgba(255,215,0," + (0.5 + 0.5 * pulse) + ")";
      ctx.shadowBlur = 18 + 10 * pulse;
      if (this.apocalypseImg && this.apocalypseImg.complete && this.apocalypseImg.naturalWidth > 0) {
        ctx.drawImage(this.apocalypseImg, p.x - CS / 2.5, p.y - CS / 2.5, CS / 1.25, CS / 1.25);
      } else {
        ctx.fillStyle = "rgba(255,215,0," + (0.7 + 0.3 * pulse) + ")";

        ctx.arc(p.x, p.y, CS / 3, 0, Math.PI * 2);

      ctx.strokeStyle = "rgba(255,215,0," + (0.3 + 0.3 * pulse) + ")";

      ctx.beginPath();
      ctx.arc(p.x, p.y, CS / 2.5, 0, Math.PI * 2);

    // ---- 终末鸟 Transformed Entity Rendering (Enemy) ----
    renderApocalypseEntity(now, e, ms) {
      const ctx = this.ctx;
      const p = this.epos(e, now, ms);
      const pulse = 0.5 + 0.5 * Math.sin(now / 250);
      ctx.save();
      ctx.shadowColor = "rgba(255,215,0," + (0.5 + 0.5 * pulse) + ")";
      ctx.shadowBlur = 16 + 8 * pulse;
      if (this.apocalypseImg && this.apocalypseImg.complete && this.apocalypseImg.naturalWidth > 0) {
        ctx.drawImage(this.apocalypseImg, p.x - CS / 2.5, p.y - CS / 2.5, CS / 1.25, CS / 1.25);
      } else {
        ctx.fillStyle = "rgba(255,215,0," + (0.7 + 0.3 * pulse) + ")";
        ctx.beginPath();
        ctx.arc(p.x, p.y, CS / 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.font = "bold 6px " + PF;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.fillText("\u7EC8\u672B\u9E1F", p.x, p.y);

      ctx.strokeStyle = "rgba(255,215,0," + (0.3 + 0.3 * pulse) + ")";

    // ---- 白夜 Message Rendering ----
    renderBaiyeMessage(now) {
      if (!this.messageText) return;
      const elapsed = now - this.messageStart;
      if (elapsed > this.messageDur) {
        this.messageText = null;
        this.messageShowCounter = false;
        return;
      }
      const ctx = this.ctx;
      const fadeInEnd = this.messageFadeIn;
      const fadeOutStart = this.messageDur - this.messageFadeOut;
      let alpha = 1;
      if (elapsed < fadeInEnd) alpha = elapsed / fadeInEnd;
      else if (elapsed > fadeOutStart) alpha = 1 - (elapsed - fadeOutStart) / this.messageFadeOut;
      ctx.save();
      ctx.globalAlpha = alpha;
      const hasCounter = this.messageShowCounter;
      const mw = 900, mh = hasCounter ? 280 : 180;
      const mx = (W - mw) / 2, my = (H - mh) / 2 - 50;
      ctx.fillStyle = "rgba(0,0,0,0.8)";
      ctx.fillRect(mx, my, mw, mh);
      ctx.strokeStyle = `rgba(255,0,0,${0.5 * alpha})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(mx, my, mw, mh);
      ctx.font = `bold 44px ${PF}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#ff0000";
      ctx.shadowColor = "#ff0000";
      ctx.shadowBlur = 8;
      const textY = hasCounter ? my + 80 : my + mh / 2;
      ctx.fillText(this.messageText, W / 2, textY);
      if (hasCounter) {
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 4;
        ctx.fillStyle = "#ffffff";
        ctx.font = `bold 48px ${PF}`;
        ctx.fillText(`(${this.baiyeCollectCount}/${WHITE_CIRCLE_MAX})`, W / 2, my + 150);
      }
      ctx.restore();
    }
    // ---- Golden Message Rendering ----
    renderGoldenMessage(now) {
      if (!this.goldenMessageText) return;
      const elapsed = now - this.goldenMessageStart;
      if (elapsed > this.goldenMessageDur) {
        this.goldenMessageText = null;
        return;
      }
      const ctx = this.ctx;
      const fadeInEnd = this.goldenMessageFadeIn;
      const fadeOutStart = this.goldenMessageDur - this.goldenMessageFadeOut;
      let alpha = 1;
      if (elapsed < fadeInEnd) alpha = elapsed / fadeInEnd;
      else if (elapsed > fadeOutStart) alpha = 1 - (elapsed - fadeOutStart) / this.goldenMessageFadeOut;
      ctx.save();
      ctx.globalAlpha = alpha;
      const mw = 1e3, mh = 340;
      const mx = (W - mw) / 2, my = (H - mh) / 2 - 50;
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      ctx.fillRect(mx, my, mw, mh);
      ctx.strokeStyle = "rgba(255,215,0," + 0.6 * alpha + ")";
      ctx.lineWidth = 2;
      ctx.strokeRect(mx, my, mw, mh);
      ctx.font = "bold 44px " + PF;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#FFD700";
      ctx.shadowColor = "#FFD700";
      ctx.shadowBlur = 10;
      const text = this.goldenMessageText;
      const maxLineW = mw - 120;
      const lines = [];
      let curLine = "";
      for (let i = 0; i < text.length; i++) {
        const testLine = curLine + text[i];
        const tw = ctx.measureText(testLine).width;
        if (tw > maxLineW && curLine.length > 0) {
          lines.push(curLine);
          curLine = text[i];
        } else {
          curLine = testLine;
        }
      }
      if (curLine) lines.push(curLine);
      const lineH = 56;
      const startY = my + (mh - lines.length * lineH) / 2 - 20;
      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], W / 2, startY + i * lineH);
      }
      ctx.shadowColor = "#FFD700";
      ctx.shadowBlur = 6;
      ctx.fillStyle = "#FFD700";
      ctx.font = "bold 48px " + PF;
      const counterY = my + mh - 40;
      if (this.apocalypseCollectCount < APOCALYPSE_SUBBOSS_MAX) {
        ctx.fillText("(" + this.apocalypseCollectCount + "/" + APOCALYPSE_SUBBOSS_MAX + ")", W / 2, counterY);
      }
      ctx.restore();
    }
    // ---- 终末鸟 Counter in HUD ----
    renderApocalypseCounter(now) {
      if (this.effectsPanelOpen) return;
      if (!this.apocalypseSpawned) {
        const remaining = Math.max(0, Math.ceil((APOCALYPSE_SPAWN_TIME - (performance.now() - this.gameStart)) / 1e3));
        if (remaining > 0) {
          const ctx2 = this.ctx;
          ctx2.save();
          ctx2.font = "bold 16px " + PF;
          ctx2.textAlign = "left";
          ctx2.textBaseline = "middle";
          ctx2.fillStyle = "#6a5a40";
          ctx2.shadowColor = "transparent";
          ctx2.shadowBlur = 0;
          ctx2.fillText("\u7EC8\u672B\u9E1F: " + remaining + "s", 12, this._hudRow2Y);
          ctx2.restore();
        }
        return;
      }
      if (this.apocalypseForm === null && this.apocalypseCollectCount === 0) return;
      const ctx = this.ctx;
      ctx.save();
      ctx.font = "bold 16px " + PF;
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      if (this.apocalypseForm !== null) {
        const pulse = 0.5 + 0.5 * Math.sin(now / 300);
        if (this.apocalypseCompleted) {
          ctx.fillStyle = "#FFD700";
          ctx.shadowColor = "#FFD700";
          ctx.shadowBlur = 6 + 4 * pulse;
          ctx.fillText("\u7EC8\u672B\u9E1F (\u5B8C\u6210!)", 12, this._hudRow2Y);
        } else {
          ctx.fillStyle = "rgba(255,215,0," + (0.7 + 0.3 * pulse) + ")";
          ctx.shadowColor = "#FFD700";
          ctx.shadowBlur = 4;
          ctx.fillText("\u7EC8\u672B\u9E1F (" + this.apocalypseCollectCount + "/" + APOCALYPSE_SUBBOSS_MAX + ")", 12, this._hudRow2Y);
        }
      } else {
        ctx.fillStyle = "#403828";
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
        ctx.fillText("\u7EC8\u672B\u9E1F", 12, this._hudRow2Y);
      }
      ctx.restore();
    }
    // ---- 白夜 Counter in HUD ----
    renderBaiyeCounter(now) {
      if (this.transformedEntity === null && this.baiyeCollectCount === 0 && !this.baiyeSpawned) return;
      const ctx = this.ctx;
      ctx.save();
      ctx.font = `bold 16px ${PF}`;
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      if (!this.baiyeSpawned) {
        const remaining = Math.max(0, Math.ceil((BAIYE_SPAWN_TIME - (performance.now() - this.gameStart)) / 1e3));
        ctx.fillStyle = "#605040";
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
        ctx.fillText(`\u767D\u591C: ${remaining}s`, W - 10, OY / 2 - 10);
      } else if (this.transformedEntity !== null) {
        const pulse = 0.5 + 0.5 * Math.sin(now / 300);
        const isHokmaBaiye = this.isHokmaChar() && this.transformedEntity === "player";
        const displayCount = isHokmaBaiye ? this.hokmaBaiyeCounter : this.baiyeCollectCount;
        const isMaxed = isHokmaBaiye ? this.hokmaBaiyeCounter >= 12 : this.baiyeCollectCount >= WHITE_CIRCLE_MAX;
        ctx.fillStyle = isMaxed ? "#ff4444" : `rgba(255,255,255,${0.7 + 0.3 * pulse})`;
        ctx.shadowColor = isMaxed ? "#ff0000" : "#ffffff";
        ctx.shadowBlur = isMaxed ? 8 + 4 * pulse : 4;
        ctx.fillText(`\u767D\u591C (${displayCount}/${WHITE_CIRCLE_MAX})`, W - 10, OY / 2 - 10);
      } else {
        ctx.fillStyle = "#403828";
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
        ctx.fillText("\u767D\u591C", W - 10, OY / 2 - 10);
      }
      ctx.restore();
    }
    // ---- Character drawing (circular-clipped portrait, face-focused) ----
    // Used for in-maze player icon and start page / char select preview.
    // Draws portrait image clipped to a circle, zoomed into the face area.
    // Face region assumed at ~12%-40% from top, center at ~26% from top.
    // Falls back to solid color circle if no portrait.
    drawCharacter(ctx, cx, cy, r, charIdx, now) {
      const ch = CHARS[charIdx];
      // Dark Roland: use dark image for circular avatar
      if (charIdx === 0 && this.rolandHiddenForm && this.darkRolandImg && this.darkRolandImg.complete && this.darkRolandImg.naturalWidth > 0) {
        const img = this.darkRolandImg;
        ctx.save();
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.clip();
        const diameter = r * 2;
        // Same face-ratio system as normal characters (matches yesod zoom level)
        const faceRatio = 0.28;
        const faceCenterRatio = 0.25; // face center position
        const faceFillTarget = 0.85; // slightly more fill than yesod's 0.75
        const shiftX = 0.08;
        const scale2 = (diameter * faceFillTarget) / (img.naturalHeight * faceRatio);
        const drawW = img.naturalWidth * scale2;
        const drawH = img.naturalHeight * scale2;
        const faceCenterDrawY = img.naturalHeight * faceCenterRatio * scale2;
        const drawX = cx - drawW / 2 + drawW * shiftX;
        const drawY = cy - faceCenterDrawY;
        ctx.drawImage(img, drawX, drawY, drawW, drawH);
        ctx.restore();
        ctx.save();
        // Clean thin black border (no glow, no shadow)
        ctx.strokeStyle = "#000000"; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
        return;
      }
      const img = this.portraitImages.get(charIdx);
      if (img && img.naturalWidth > 0) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.clip();
        const diameter = r * 2;
        const faceRatio = ch.faceRatio || 0.28;
        const faceCenterRatio = ch.faceCenterRatio || 0.26;
        const faceFillTarget = 0.75;
        const shiftX = ch.faceShiftX || 0.25;
        const scale = diameter * faceFillTarget / (img.naturalHeight * faceRatio);
        const drawW = img.naturalWidth * scale;
        const drawH = img.naturalHeight * scale;
        const faceCenterDrawY = img.naturalHeight * faceCenterRatio * scale;
        const drawX = cx - drawW / 2 + drawW * shiftX;
        const drawY = cy - faceCenterDrawY;
        ctx.drawImage(img, drawX, drawY, drawW, drawH);
        ctx.restore();
        ctx.save();
        ctx.shadowColor = ch.glow;
        ctx.shadowBlur = r * 0.8;
        ctx.strokeStyle = ch.glow;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      } else {
        ctx.save();
        ctx.shadowColor = ch.glow;
        ctx.shadowBlur = r * 0.8;
        ctx.fillStyle = ch.color;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = ch.hi;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(cx - r * 0.25, cy - r * 0.25, r * 0.35, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
      }
    }
    // ---- Draw portrait image (full, rectangular, for detail page) ----
    // Draws portrait image if available, fitting it within maxW×maxH, centered at (cx, cy).
    // Falls back to drawCharacter circle if no portrait.
    drawPortrait(ctx, cx, cy, maxW, maxH, charIdx, now) {
      const img = this.portraitImages.get(charIdx);
      if (img && img.naturalWidth > 0) {
        ctx.save();
        const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight);
        const drawW = img.naturalWidth * scale;
        const drawH = img.naturalHeight * scale;
        const drawX = cx - drawW / 2;
        const drawY = cy - drawH / 2;
        ctx.shadowColor = CHARS[charIdx].glow;
        ctx.shadowBlur = 12;
        ctx.drawImage(img, drawX, drawY, drawW, drawH);
        ctx.shadowBlur = 0;
        ctx.restore();
      } else {
        const r = Math.min(maxW, maxH) / 2;
        this.drawCharacter(ctx, cx, cy, r, charIdx, now);
      }
    }
    // ---- Golden Rising Particles ----
    updateGoldParticles(now) {
      if (now - this.lastGoldSpawn >= _Game.GOLD_SPAWN_INTERVAL) {
        this.lastGoldSpawn = now;
        const count = 1 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count; i++) {
          const x = Math.random() * W;
          const baseSpeed = 0.3 + Math.random() * 0.6;
          const wobbleAmp = 0.2 + Math.random() * 0.5;
          this.goldParticles.push({
            x,
            y: H + 5,
            vy: -baseSpeed,
            vx: wobbleAmp * (Math.random() < 0.5 ? 1 : -1),
            size: 1.2 + Math.random() * 2,
            alpha: 0.5 + Math.random() * 0.5,
            trail: []
          });
        }
      }
      const dt = 1;
      const midY = H * _Game.GOLD_MID_Y;
      const fadeRange = H * 0.15;
      for (const p of this.goldParticles) {
        p.trail.push({ x: p.x, y: p.y, a: p.alpha });
        if (p.trail.length > 6) p.trail.shift();
        p.y += p.vy * dt;
        p.vx += (Math.random() - 0.5) * 0.08;
        p.vx = Math.max(-1.5, Math.min(1.5, p.vx));
        p.x += p.vx * dt;
        const distToMid = p.y - midY;
        if (distToMid < fadeRange && distToMid > 0) {
          p.alpha = distToMid / fadeRange * (0.5 + Math.random() * 0.1);
        } else if (distToMid <= 0) {
          p.alpha *= 0.85;
        }
      }
      this.goldParticles = this.goldParticles.filter((p) => p.alpha > 0.02 && p.y > midY - H * 0.2);
    }
    renderGoldParticles() {
      const ctx = this.ctx;
      ctx.save();
      for (const p of this.goldParticles) {
        for (let i = 0; i < p.trail.length; i++) {
          const tp = p.trail[i];
          const trailAlpha = i / p.trail.length * tp.a * 0.4;
          const trailSize = p.size * (i / p.trail.length) * 0.7;
          ctx.fillStyle = `rgba(200,162,78,${trailAlpha})`;
          ctx.beginPath();
          ctx.arc(tp.x, tp.y, Math.max(0.5, trailSize), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.shadowColor = "rgba(200,162,78,0.6)";
        ctx.shadowBlur = 6;
        ctx.fillStyle = `rgba(232,213,160,${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.5, p.size), 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    }
    // ---- Start Page ----
    renderStartPage(now) {
      const ctx = this.ctx;
      // Defensive clear to prevent any leftover content from previous phase
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = CLR.bg;
      ctx.fillRect(0, 0, W, H);
      this.renderGoldParticles();
      const vg = ctx.createRadialGradient(W / 2, H / 2, W * 0.15, W / 2, H / 2, W * 0.6);
      vg.addColorStop(0, "rgba(0,0,0,0)");
      vg.addColorStop(1, "rgba(5,4,3,0.7)");
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, H);
      drawGothicBorder(ctx, W / 2 - 400, H / 2 - 280, 800, 560);
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `bold 56px ${PF}`;
      ctx.fillStyle = GOTH.paleGold;
      ctx.shadowColor = GOTH.darkGold;
      ctx.shadowBlur = 20;
      ctx.fillText("Maze Of Ruina", W / 2, H / 2 - 170);
      ctx.restore();
      drawBaroqueScroll(ctx, W / 2 - 180, H / 2 - 115, 360, GOTH.darkGold);
      ctx.save();
      ctx.textAlign = "center";
      ctx.font = `bold 18px ${PF}`;
      ctx.fillStyle = "#807060";
      ctx.fillText("\u5E9F\u589F\u56FE\u4E66\u9986\uFF08\u540C\u4EBA\u6E38\u620F\uFF09", W / 2, H / 2 - 85);
      ctx.restore();
      drawHexagram(ctx, W / 2 - 280, H / 2 - 180, 25, GOTH.darkGold, 0.4);
      drawHexagram(ctx, W / 2 + 280, H / 2 - 180, 25, GOTH.darkGold, 0.4);
      const ch = CHARS[this.selectedChar];
      ctx.save();
      ctx.textAlign = "center";
      ctx.font = `bold 16px ${PF}`;
      ctx.fillStyle = "#6a5a40";
      ctx.fillText("\u5F53\u524D\u89D2\u8272", W / 2, H / 2 - 60);
      ctx.restore();
      this.drawCharacter(ctx, W / 2, H / 2 - 15, 35, this.selectedChar, now);
      ctx.save();
      ctx.textAlign = "center";
      ctx.font = `bold 14px ${PF}`;
      ctx.fillStyle = ch.hi;
      ctx.shadowColor = ch.glow;
      ctx.shadowBlur = 4;
      ctx.fillText(ch.name, W / 2, H / 2 + 35);
      ctx.font = `12px ${PF}`;
      ctx.fillStyle = "#6a5a40";
      ctx.shadowBlur = 0;
      ctx.fillText(`[${ch.skillName}] ${ch.skillDesc}`, W / 2, H / 2 + 55);
      if (this.rolandHiddenForm && this.selectedChar === 0) {
        ctx.font = `11px ${PF}`;
        ctx.fillStyle = "#4a0000";
        ctx.fillText("\u2014\u2014 \u6F06\u9ED1\u5664\u9ED8 \u2014\u2014", W / 2, H / 2 + 73);
      }
      // Smoke particles for dark roland
      if (this.rolandHiddenForm && this.selectedChar === 0) {
        // Spawn new particles
        if (Math.random() < 0.3) {
          this.darkRolandSmokeParticles.push({
            x: W / 2 + (Math.random() - 0.5) * 60,
            y: H / 2 + 20,
            vx: (Math.random() - 0.5) * 0.5,
            vy: -Math.random() * 1.5 - 0.5,
            life: 1,
            maxLife: 1,
            size: Math.random() * 8 + 4,
            alpha: 0.4 + Math.random() * 0.3,
            color: Math.random() > 0.5 ? '#333333' : '#1a1a1a',
          });
        }
        // Update and render particles
        for (let i = this.darkRolandSmokeParticles.length - 1; i >= 0; i--) {
          const p = this.darkRolandSmokeParticles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.008;
          if (p.life <= 0) { this.darkRolandSmokeParticles.splice(i, 1); continue; }
          ctx.save();
          ctx.globalAlpha = p.alpha * p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        // Keep particle count manageable
        if (this.darkRolandSmokeParticles.length > 30) {
          this.darkRolandSmokeParticles.splice(0, this.darkRolandSmokeParticles.length - 30);
        }

        if (this.selectedChar === 9 && this.binahBattleTimerStart > 0 && this.binahEffects.length < 5) {
          const elapsed2 = now - this.binahBattleTimerStart;
          const remaining2 = Math.max(0, Math.ceil((15e3 - elapsed2) / 1e3));
          const skillX2 = 120 + ctx.measureText(ch.name).width + 8;
          const binahTimerText = ` \u23F1${remaining2}s (${this.binahBattleCountInWindow}/2)`;
          ctx.fillStyle = "#4a4a6e";

      ctx.fillStyle = "#6a5a40";
      ctx.textAlign = "center";

    renderCtrlPanel(now) {

    renderScoreBar(ctx, now, x, y, w, h) {
      const barH = 28;
      const barY = y + (h - barH) / 2;
      const maxVal = this.totalPts;
      if (maxVal <= 0) return;
      const quarter = Math.floor(maxVal / 4);
      const half = Math.floor(maxVal / 2);
      ctx.fillStyle = "#13100c";
      ctx.fillRect(x, barY, w, barH);
      ctx.strokeStyle = "#2a2218";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, barY, w, barH);
      const qX = x + quarter / maxVal * w;
      const hX = x + half / maxVal * w;
      ctx.save();
      ctx.setLineDash([3, 3]);
      ctx.strokeStyle = CLR.anger;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(qX, barY + 2);
      ctx.lineTo(qX, barY + barH - 2);
      ctx.stroke();
      ctx.strokeStyle = CLR.danger;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(hX, barY + 2);
      ctx.lineTo(hX, barY + barH - 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      const fillW = clamp(this.score / maxVal * w, 0, w);
      if (fillW > 0) {
        const grad = ctx.createLinearGradient(x, 0, x + w, 0);
        if (this.score <= quarter) {
          grad.addColorStop(0, "#8b7340");
          grad.addColorStop(1, "#8b7340");
        } else if (this.score <= half) {
          grad.addColorStop(0, "#8b7340");
          grad.addColorStop(clamp(quarter / maxVal, 0, 1), "#ffd700");
          grad.addColorStop(1, "#ffd700");
        } else {
          grad.addColorStop(0, "#8b7340");
          grad.addColorStop(clamp(quarter / maxVal, 0, 1), "#ffd700");
          grad.addColorStop(clamp(half / maxVal, 0, 1), "#cc0000");
          grad.addColorStop(1, "#cc0000");
        }
        ctx.fillStyle = grad;
        ctx.fillRect(x, barY + 1, fillW, barH - 2);
        ctx.save();
        ctx.shadowColor = this.score > half ? "#cc0000" : this.score > quarter ? "#ffd700" : "#ffd700";
        ctx.shadowBlur = 6;
        ctx.fillRect(x, barY + 1, fillW, barH - 2);
        ctx.restore();
      }
      const markerX = x + fillW;
      ctx.save();
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(markerX, barY + 2);
      ctx.lineTo(markerX - 4, barY + 6);
      ctx.lineTo(markerX + 4, barY + 6);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.font = `bold 12px ${PF}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#c8a24e";
      ctx.shadowColor = "#c8a24e";
      ctx.shadowBlur = 2;
      ctx.fillText(`${this.score} / ${maxVal}`, x + w / 2, barY + barH / 2);
      ctx.restore();
      if (this.angerActive) {
        const pulse = 0.5 + 0.5 * Math.sin(now / 200);
        ctx.save();
        ctx.strokeStyle = `rgba(255,68,0,${0.5 + 0.5 * pulse})`;
        ctx.lineWidth = 2;
        ctx.shadowColor = CLR.angerG;
        ctx.shadowBlur = 6 + 6 * pulse;
        ctx.strokeRect(x - 1, barY - 1, w + 2, barH + 2);
        ctx.restore();
        const effectiveDur = ANGER_DUR - (CHARS[this.selectedChar].angerDurReduce || 0);
        const pct = clamp(this.angerRemaining / effectiveDur, 0, 1);
        ctx.fillStyle = `rgba(255,68,0,${0.15 + 0.1 * pulse})`;
        ctx.fillRect(x, barY, w * pct, barH);
      }
    }
    drawBtn(b) {
      const ctx = this.ctx;
      ctx.fillStyle = b.active ? "rgba(200,162,78,0.15)" : CLR.btnBg;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = b.active ? "#c8a24e" : CLR.btnBorder;
      ctx.lineWidth = b.big ? 2 : 1;
      ctx.strokeRect(b.x, b.y, b.w, b.h);
      if (b.big) {
        ctx.strokeStyle = b.active ? "rgba(200,162,78,0.4)" : "rgba(122,104,48,0.4)";
        ctx.lineWidth = 1;
        ctx.strokeRect(b.x + 3, b.y + 3, b.w - 6, b.h - 6);
      }
      ctx.save();
      ctx.shadowColor = b.active ? "#ffd700" : CLR.btnBorder;
      ctx.shadowBlur = b.big ? 10 : 4;
      ctx.font = `bold ${b.big ? 16 : 14}px ${PF}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = b.active ? "#ffd700" : "#b0a080";
      ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2);

    // ---- 3D Spinning Die ----
    drawSpinningDie(cx, cy, sz, val, col, elapsed) {
      const ctx = this.ctx;
      const progress = clamp(elapsed / ATK_SPIN_DUR, 0, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const spinSpeed = (1 - eased) * 18 + 2;
      const angle = elapsed * spinSpeed * 0.02;
      const scaleX = Math.cos(angle);
      const absScale = Math.max(0.08, Math.abs(scaleX));
      const halfW = sz / 2;
      const halfH = sz / 2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      ctx.beginPath();
      ctx.ellipse(0, halfH + 4, halfW * absScale * 0.8, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      const w = sz * absScale;
      const h = sz;
      ctx.fillStyle = "#13100c";
      ctx.strokeStyle = col;
      ctx.lineWidth = 2;
      ctx.shadowColor = col;
      ctx.shadowBlur = 8 + (1 - progress) * 6;
      ctx.beginPath();
      ctx.rect(-w / 2, -h / 2, w, h);
      ctx.fill();
      ctx.stroke();
      if (absScale > 0.3) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = col;
        ctx.font = `bold ${Math.floor(sz * 0.5 * absScale)}px ${PF}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const showVal = progress < 0.85 ? rand(1, 10) : val;
        ctx.globalAlpha = absScale;
        ctx.fillText(String(showVal), 0, 0);
        ctx.globalAlpha = 1;
      }
      if (progress < 0.7) {
        ctx.strokeStyle = col;
        ctx.lineWidth = 1;
        ctx.globalAlpha = (1 - progress) * 0.4;
        ctx.shadowColor = col;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.ellipse(0, 0, halfW * 1.3, halfH * 1.1, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      ctx.restore();
    }
    // ---- Draw Attack Trails ----
    drawAtkTrails(trails, col) {
      const ctx = this.ctx;
      for (const t of trails) {
        const alpha = (1 - t.age / 12) * 0.6;
        const size = 35 * (1 - t.age / 12);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = col;
        ctx.shadowColor = col;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(t.x, t.y, Math.max(1, size), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
    // ---- Draw Impact Particles ----
    drawAtkParticles(particles) {
      const ctx = this.ctx;
      for (const p of particles) {
        const alpha = clamp(p.life / 30, 0, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(1, p.size * alpha), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
    // ---- Diamond-Pivot Spinning Die (speed phase animation) ----
    // Die starts as a diamond (square rotated 45°), balanced on bottom vertex
    drawCornerSpinDie(x, y, sz, val, col, elapsed) {
      const ctx = this.ctx;
      const isRoland = this.selectedChar === 0 && !this.isGeburaEmotionChar() && !CHARS[this.selectedChar].emotionChar;
      const glowCol = isRoland ? "#666666" : col;
      const progress = clamp(elapsed / SPD_SPIN_DUR, 0, 1);
      const eased = 1 - Math.pow(1 - progress, 2.5);
      const totalFlips = 3;
      const flipAngle = (1 - eased) * totalFlips * Math.PI * 2;
      const scaleX = Math.abs(Math.cos(flipAngle));
      const absScale = Math.max(0.05, scaleX);
      const pivotX = x + sz / 2;
      const pivotY = y + sz;
      ctx.save();
      ctx.translate(pivotX, pivotY);
      const halfDiag = sz / 2 * 1.414;
      const w = halfDiag * absScale;
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.beginPath();
      ctx.ellipse(0, 4, Math.max(1, w * 0.45), 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#13100c";
      ctx.strokeStyle = col;
      ctx.lineWidth = 2;
      ctx.shadowColor = glowCol;
      ctx.shadowBlur = isRoland ? 18 * (1 - progress) + 10 : 8 * (1 - progress) + 4;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(w, -halfDiag);
      ctx.lineTo(0, -halfDiag * 2);
      ctx.lineTo(-w, -halfDiag);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      if (isRoland) {
        ctx.strokeStyle = `rgba(102,102,102,${0.35 * (1 - progress) + 0.15})`;
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      if (absScale > 0.3) {
        ctx.fillStyle = col;
        if (isRoland) {
          ctx.shadowColor = glowCol;
          ctx.shadowBlur = 6;
        }
        const dotCx = 0, dotCy = -halfDiag;
        const showVal = progress < 0.8 ? rand(1, Math.max(8, val)) : val;
        if (showVal > 8) {
          ctx.save();
          const numSize = Math.floor(sz * 0.35 * absScale);
          ctx.font = `bold ${numSize}px ${PF}`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillStyle = col;
          if (isRoland) {
            ctx.shadowColor = glowCol;
            ctx.shadowBlur = 6;
          }
          ctx.fillText(String(showVal), dotCx, dotCy);
          ctx.restore();
        } else {
          const r = Math.max(1, Math.round(sz / 9 * absScale));
          const sp = Math.max(2, Math.round(sz / 4 * absScale * 0.8));
          const dot = (ddx, ddy) => {
            ctx.beginPath();
            ctx.arc(dotCx + Math.round(ddx * sp), dotCy + Math.round(ddy * sp), r, 0, Math.PI * 2);
            ctx.fill();
          };
          if (showVal >= 2) {
            dot(-1, -1);
            dot(1, 1);
          }
          if (showVal >= 4) {
            dot(1, -1);
            dot(-1, 1);
          }
          if (showVal === 6) {
            dot(-1, 0);
            dot(1, 0);
          }
          if (showVal === 7) dot(0, -1.45);
          if (showVal === 8) dot(0, 1.45);
          if (showVal === 1 || showVal === 3 || showVal === 5) dot(0, 0);
        }
        ctx.shadowBlur = 0;
      }
      if (progress < 0.5) {
        ctx.strokeStyle = glowCol;
        ctx.lineWidth = 1;
        ctx.globalAlpha = (1 - progress * 2) * 0.3;
        ctx.shadowColor = glowCol;
        ctx.shadowBlur = isRoland ? 16 : 10;
        ctx.beginPath();
        ctx.ellipse(0, -halfDiag, Math.max(1, w * 0.6), halfDiag * 0.5, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      ctx.restore();
    }
    // ---- Number Display Box (attack phase - shows number instead of dots) ----
    drawNumberBox(x, y, sz, val, col) {
      const ctx = this.ctx;
      const isRoland = this.selectedChar === 0 && !this.isGeburaEmotionChar() && !CHARS[this.selectedChar].emotionChar;
      const glowCol = isRoland ? "#666666" : col;
      ctx.fillStyle = "#13100c";

      ctx.strokeStyle = col;

      ctx.shadowColor = glowCol;
      ctx.shadowBlur = isRoland ? 14 : 6;

        ctx.strokeStyle = "rgba(102,102,102,0.25)";

        ctx.strokeRect(x - 1, y - 1, sz + 2, sz + 2);

      ctx.restore();

      ctx.fillStyle = col;
      ctx.shadowColor = glowCol;
      ctx.shadowBlur = isRoland ? 10 : 4;
      ctx.font = `bold ${Math.floor(sz * 0.45)}px ${PF}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(val), x + sz / 2, y + sz / 2);
      ctx.restore();
    }
    drawDie(x, y, sz, val, col) {
      const ctx = this.ctx;
      const isRoland = this.selectedChar === 0 && !this.isGeburaEmotionChar() && !CHARS[this.selectedChar].emotionChar;
      const glowCol = isRoland ? "#666666" : col;
      x = Math.round(x);
      y = Math.round(y);
      ctx.fillStyle = "#13100c";
      ctx.fillRect(x, y, sz, sz);
      ctx.strokeStyle = col;
      ctx.lineWidth = 2;
      ctx.save();
      ctx.shadowColor = glowCol;
      ctx.shadowBlur = isRoland ? 14 : 6;
      ctx.strokeRect(x, y, sz, sz);
      if (isRoland) {
        ctx.strokeStyle = "rgba(102,102,102,0.25)";
        ctx.lineWidth = 3;
        ctx.strokeRect(x - 1, y - 1, sz + 2, sz + 2);
      }
      ctx.restore();
      ctx.fillStyle = col;
      if (isRoland) {
        ctx.shadowColor = glowCol;
        ctx.shadowBlur = 8;
      }

      if (val > 8) {

        ctx.textBaseline = "middle";
        ctx.fillStyle = col;
        if (isRoland) {
          ctx.shadowColor = glowCol;
          ctx.shadowBlur = 6;
        }
        ctx.fillText(String(val), cx, cy);
        ctx.restore();
      } else {
        const dot = (dx, dy) => {
          ctx.beginPath();
          ctx.arc(cx + Math.round(dx * sp), cy + Math.round(dy * sp), r, 0, Math.PI * 2);
          ctx.fill();
        };
        if (val >= 2) {
          dot(-1, -1);
          dot(1, 1);
        }
        if (val >= 4) {
          dot(1, -1);
          dot(-1, 1);
        }
        if (val === 6) {
          dot(-1, 0);
          dot(1, 0);
        }
        if (val === 7) dot(0, -1.5);
        if (val === 8) dot(0, 1.5);
        if (val === 1 || val === 3 || val === 5) dot(0, 0);
      }
      ctx.shadowBlur = 0;
    }
    // ---- Draw ∞ Infinity Die ----

    // ---- Enemy Trails ----

        const alpha = (1 - progress) * 0.4;

        { text: '\u9677\u9635\u4E4B\u5FD7\u2192\u6218\u6597\u80DC\u5229\u540E\uFF0C"\u6BB7\u7EA2\u8FF7\u96FE"\u968F\u673A\u4F20\u9001\u5230\u53E6\u4E00\u4E2A\u5355\u4F4D\u9644\u8FD1', color: "#ff8888" },
        { text: "", color: "#807060" },
        { text: "\u62FC\u70B9\u89C4\u5219:", color: CLR.hud },

        { text: "\u9AD8\u901F\u65B9\u53D1\u8D77\u62FC\u70B9\uFF0C\u6BCF\u5927\u4E8E2\u70B9\u2192\u62FC\u70B9\u6570\u503C+1", color: "#908070" },
        { text: "\u53CC\u65B9\u6570\u503C\u6BD4\u8F83\uFF0C\u5DEE\u503C=\u5BF9\u5BF9\u65B9\u9020\u6210\u7684\u4F24\u5BB3", color: "#908070" },
        { text: "\u5168\u90E8\u56DE\u5408\u7ED3\u675F\u540E\u6BD4\u8F83\u603B\u53D7\u4F24\u91CF", color: "#908070" },
        { text: "\u603B\u53D7\u4F24\u91CF\u8F83\u5C11\u7684\u4E00\u65B9\u83B7\u80DC", color: "#908070" }
      ];
      const contentTop = py + 90;
      const contentBottom = py + ph - 90;
      const contentH = contentBottom - contentTop;
      ctx.save();
      ctx.beginPath();
      ctx.rect(px + 10, contentTop, pw - 20, contentH);
      ctx.clip();
      ctx.font = `bold 16px ${PF}`;
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      let ly = contentTop - this.gameInfoScroll;
      for (const line of lines) {
        if (line.condition && !line.condition()) continue;
        if (!line.text) {
          ly += 20;
          continue;
        }
        ctx.fillStyle = line.color;
        ctx.fillText(line.text, px + 50, ly);
        ly += 40;
      }
      ctx.restore();
      const totalContentH = ly - contentTop + this.gameInfoScroll;
      const maxScroll = Math.max(0, totalContentH - contentH);
      if (maxScroll > 0) {
        const scrollBarX = px + pw - 18;
        const scrollBarH = contentH;
        const handleH = Math.max(30, scrollBarH * (contentH / totalContentH));
        const handleY = contentTop + this.gameInfoScroll / maxScroll * (scrollBarH - handleH);
        ctx.save();
        ctx.fillStyle = "rgba(200,162,78,0.3)";
        ctx.beginPath();
        ctx.roundRect(scrollBarX, contentTop, 8, scrollBarH, 4);
        ctx.fill();
        ctx.fillStyle = GOTH.darkGold;
        ctx.shadowColor = GOTH.darkGold;
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.roundRect(scrollBarX, handleY, 8, handleH, 4);
        ctx.fill();

    // ---- Battle Rendering ----
    renderBattle(now) {
      const ctx = this.ctx;
      const b = this.battle;
      ctx.fillStyle = "rgba(10,9,8,0.82)";
      ctx.fillRect(0, 0, W, H);
      const baiyeActive = this.baiyeCollectCount >= WHITE_CIRCLE_MAX && this.transformedEntity !== null;
      const angerBaiye = b.angerBattle && baiyeActive;
      const px = W / 2 - 400, py = 80, pw = 800, ph = angerBaiye ? 780 : baiyeActive ? 760 : 730;
      ctx.fillStyle = "rgba(15,13,10,0.97)";

      ctx.strokeStyle = b.angerBattle ? CLR.angerG : CLR.wall2;

      ctx.shadowBlur = 12;
      ctx.strokeRect(px, py, pw, ph);

      const ac2 = 25;
