      ctx.fillText("\u2694 START RECEPTION \u2694", W / 2, py + 35);
      drawHexagram(ctx, px + 70, py + 40, 15, b.angerBattle ? CLR.anger : GOTH.darkGold, 0.5);
      drawHexagram(ctx, px + pw - 70, py + 40, 15, b.angerBattle ? CLR.anger : GOTH.darkGold, 0.5);
      ctx.restore();
      let statusLine1Y = 0;
      if (b.angerBattle) {
        ctx.save();
        const pulse = 0.5 + 0.5 * Math.sin(now / 200);
        ctx.font = `bold 22px ${PF}`;
        ctx.textAlign = "center";
        ctx.fillStyle = `rgba(255,100,0,${0.7 + 0.3 * pulse})`;
        ctx.shadowColor = CLR.angerG;
        ctx.shadowBlur = 10;
        ctx.fillText("\u{1F525} \u60C5\u611F\u63D0\u5347 \u{1F525}", W / 2, py + 70);
        ctx.restore();
        statusLine1Y = py + 70;
      }
      if (this.baiyeCollectCount >= WHITE_CIRCLE_MAX && this.transformedEntity !== null) {
        const pulse = 0.5 + 0.5 * Math.sin(now / 250);
        ctx.save();
        ctx.font = `bold 22px ${PF}`;
        ctx.textAlign = "center";
        ctx.fillStyle = `rgba(255,255,255,${0.7 + 0.3 * pulse})`;
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 10;
        const side = this.transformedEntity === "player" ? "\u7EA2\u65B9" : "\u767D\u591C";
        const baiyeY = b.angerBattle ? py + 92 : py + 70;
        const isPlayerEnhanced = this.isHokmaChar() && this.hokmaBaiyeCounter >= 12 && this.transformedEntity === "player";
        const immThresh = isPlayerEnhanced ? 12 : 6;
        const immSym = isPlayerEnhanced ? "\u2264" : "<";
        ctx.fillText(`\u{1F319} \u767D\u591C\u52A0\u6301: ${side}\u653B\u51FB+11 | \u53D7\u4F24${immSym}${immThresh}\u514D\u75AB${isPlayerEnhanced ? " [\u5F3A\u5316]" : ""} \u{1F319}`, W / 2, baiyeY);
        ctx.restore();
        statusLine1Y = baiyeY;
      }
      const scrollY = statusLine1Y > 0 ? statusLine1Y + 15 : py + 60;
      drawBaroqueScroll(ctx, px + 150, scrollY, pw - 300, b.angerBattle ? "#5a2a00" : GOTH.darkGold);
      const redCx = px + 200, greenCx = px + 600;
      const headerEnd = scrollY + 18;
      const charY = headerEnd + 78;
      const redIsApoc = this.apocalypseForm === "player";
      const greenIsApoc = typeof this.apocalypseForm === "number" && this.apocalypseForm === b.eIdx;
      const redIsBaiye = this.transformedEntity === "player";
      const greenIsBaiye = typeof this.transformedEntity === "number" && this.transformedEntity === b.eIdx;
      const curChar = CHARS[this.selectedChar];
      const redCol = redIsApoc ? "#FFD700" : redIsBaiye ? "#ffffff" : curChar.color;
      const greenCol = greenIsApoc ? "#FFD700" : greenIsBaiye ? "#ffffff" : b.angerBattle ? CLR.anger : CLR.enemy;
      if (redIsApoc) {
        ctx.save();
        ctx.shadowColor = "#FFD700";
        ctx.shadowBlur = 20;
        if (this.apocalypseImg && this.apocalypseImg.complete && this.apocalypseImg.naturalWidth > 0) {
          ctx.drawImage(this.apocalypseImg, redCx - 24, charY - 24, 48, 48);
        } else {
          ctx.fillStyle = "#FFD700";
          ctx.beginPath();
          ctx.arc(redCx, charY, 24, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      } else if (this.transformedEntity === "player") {
        ctx.save();
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 20;
        if (this.baiyeImg && this.baiyeImg.complete && this.baiyeImg.naturalWidth > 0) {
          ctx.drawImage(this.baiyeImg, redCx - 24, charY - 24, 48, 48);
        } else {
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(redCx, charY, 24, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      } else {
        if (this.rolandHiddenForm && this.selectedChar === 0) {
          // Draw dark roland avatar with portrait image
          this.drawCharacter(ctx, redCx, charY, 28, this.selectedChar, now);
          // Extra bright gray glow aura for dark Roland
          ctx.save();
          ctx.shadowColor = "#aaaaaa";
          ctx.shadowBlur = 22;
          ctx.strokeStyle = "rgba(170,170,170,0.7)";
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.arc(redCx, charY, 31, 0, Math.PI * 2);
          ctx.stroke();
          ctx.shadowColor = "#bbbbbb";
          ctx.shadowBlur = 14;
          ctx.strokeStyle = "rgba(187,187,187,0.35)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(redCx, charY, 36, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
          // Battle smoke particles
          if (Math.random() < 0.2) {
            this.darkRolandSmokeParticles.push({
              x: redCx + (Math.random() - 0.5) * 40,
              y: charY + 20,
              vx: (Math.random() - 0.5) * 0.8,
              vy: -Math.random() * 1 - 0.3,
              life: 1, maxLife: 1,
              size: Math.random() * 6 + 3,
              alpha: 0.3 + Math.random() * 0.2,
              color: Math.random() > 0.5 ? '#333333' : '#1a1a1a',
            });
          }
        } else {
          this.drawCharacter(ctx, redCx, charY, 28, this.selectedChar, now);
        }
      }
      const greenIsTransformed = typeof this.transformedEntity === "number" && this.transformedEntity === b.eIdx;
      if (greenIsApoc) {
        ctx.save();
        ctx.shadowColor = "#FFD700";
        ctx.shadowBlur = 20;
        if (this.apocalypseImg && this.apocalypseImg.complete && this.apocalypseImg.naturalWidth > 0) {
          ctx.drawImage(this.apocalypseImg, greenCx - 24, charY - 24, 48, 48);
        } else {
          ctx.fillStyle = "#FFD700";
          ctx.beginPath();
          ctx.arc(greenCx, charY, 24, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      } else if (greenIsTransformed) {
        ctx.save();
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 20;
        if (this.baiyeImg && this.baiyeImg.complete && this.baiyeImg.naturalWidth > 0) {
          ctx.drawImage(this.baiyeImg, greenCx - 24, charY - 24, 48, 48);
        } else {
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(greenCx, charY, 24, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      } else if (b.angerBattle) {
        ctx.save();
        ctx.shadowColor = CLR.angerG;
        ctx.shadowBlur = 22;
        ctx.fillStyle = CLR.anger;
        ctx.beginPath();
        ctx.arc(greenCx, charY, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "#3a1a0a";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(greenCx - 9, charY - 5);
        ctx.lineTo(greenCx - 3, charY - 9);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(greenCx + 9, charY - 5);
        ctx.lineTo(greenCx + 3, charY - 9);
        ctx.stroke();
        ctx.fillStyle = "#4a0000";
        ctx.fillRect(greenCx - 6, charY - 1, 3, 3);
        ctx.fillRect(greenCx + 4, charY - 1, 3, 3);
        ctx.strokeStyle = "#3a1a0a";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(greenCx, charY + 8, 5, 1.2 * Math.PI, 1.8 * Math.PI);
        ctx.stroke();
        ctx.restore();
      } else {
        ctx.save();
        ctx.shadowColor = CLR.enemyG;
        ctx.fillStyle = CLR.enemy;
        ctx.beginPath();
        ctx.arc(greenCx, charY, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.font = `bold 20px ${PF}`;
      ctx.textAlign = "center";
      ctx.fillStyle = redIsApoc ? "#FFD700" : this.transformedEntity === "player" ? "#ffffff" : curChar.hi;
      ctx.fillText(redIsApoc ? "\u7EC8\u672B\u9E1F (\u4F60)" : this.transformedEntity === "player" ? "\u767D\u591C (\u4F60)" : `${curChar.name} (\u4F60)`, redCx, charY + 50);
      ctx.fillStyle = greenIsApoc ? "#FFD700" : greenIsTransformed ? "#ffffff" : b.angerBattle ? CLR.anger : CLR.enemy;
      ctx.fillText(greenIsApoc ? "\u7EC8\u672B\u9E1F (\u654C)" : greenIsTransformed ? "\u767D\u591C (\u654C)" : b.angerBattle ? "\u6012\u654C (\u6012)" : "\u7EFF\u65B9 (\u654C)", greenCx, charY + 50);
      ctx.font = `14px ${PF}`;
      let [actualRMin, actualRMax] = this.redDiceRange();
      let [actualGMin, actualGMax] = this.greenDiceRange();
      if (this.baiyeCollectCount >= WHITE_CIRCLE_MAX && this.transformedEntity !== null) {
        if (this.transformedEntity === "player") {
          actualRMin += 2;
          actualRMax += 2;
        } else if (typeof this.transformedEntity === "number" && this.transformedEntity === b.eIdx) {
          actualGMin += 2;
          actualGMax += 2;
        }
      }
      const spdMinFloor = CHARS[this.selectedChar].speedDiceMin || 0;
      if (spdMinFloor > 0) {
        actualRMin = Math.max(spdMinFloor, actualRMin);
        actualRMax = Math.max(spdMinFloor, actualRMax);
      }
      if (this.apocalypseCompleted && this.apocalypseForm !== null) {
        const apocIsGreen = typeof this.apocalypseForm === "number" && this.apocalypseForm === b.eIdx;
        const apocIsRed = this.apocalypseForm === "player";
        if (apocIsGreen && this.apocalypseOriginalForm === "enemy") {
          actualGMin += 1 * DISCIPLINE_MAX;
          actualGMax += 1 * DISCIPLINE_MAX;
        }
      }
      const isRolandBattle = this.selectedChar === 0 && !this.isGeburaEmotionChar() && !CHARS[this.selectedChar].emotionChar && !redIsApoc && this.transformedEntity !== "player";
      ctx.font = `14px ${PF}`;
      ctx.fillStyle = "#605040";
      if (isRolandBattle) {
        ctx.shadowColor = "#666666";
        ctx.shadowBlur = 6;
      }
      ctx.fillText("\u901F\u5EA6: " + actualRMin + "~" + actualRMax, redCx, charY + 68);
      ctx.fillText("\u901F\u5EA6: " + actualGMin + "~" + actualGMax, greenCx, charY + 68);
      ctx.shadowBlur = 0;
      const baseY = battleBaseY(b.angerBattle, baiyeActive);
      const ibY = battleIbY(b.angerBattle, baiyeActive);
      if (b.phase === "speed") {
        const spdElapsed = now - b.timer;
        const spdSpinEnd = SPD_SPIN_DUR;
        const spdBounceEnd = spdSpinEnd + SPD_BOUNCE_DUR;
        const spdArrowEnd = spdBounceEnd + SPD_ARROW_DUR;
        b.speedAnimDone = spdElapsed >= spdArrowEnd;
        ctx.font = `bold 20px ${PF}`;
        ctx.fillStyle = "#908070";
        ctx.textAlign = "center";
        if (isRolandBattle) {
          ctx.shadowColor = "#888888";
          ctx.shadowBlur = 8;
        }
        ctx.fillText("\u901F\u5EA6\u9AB0\u5B50", W / 2, baseY);
        ctx.shadowBlur = 0;
        const showDarkWeapons = this.rolandHiddenForm && this.selectedChar === 0 && this.darkRolandBattleWeapons.length > 0;
        const curWeapon = CHARS[this.selectedChar].workshopName;
        if (curWeapon && !showDarkWeapons) {
          ctx.font = `14px ${PF}`;
          ctx.fillStyle = "#807060";
          ctx.textAlign = "center";
          ctx.fillText(curWeapon, W / 2, baseY + 24);
        }
        // Dark Roland: display weapon names below the start battle button
        if (showDarkWeapons) {
          ctx.save();
          const weaponNames = this.darkRolandBattleWeapons.map(w => w.name).join(" / ");
          const wrappedWeapons = this.wrapText(weaponNames, pw - 200);
          const hasDodge = this.darkRolandDodgeDice > 0;
          const lineCount = wrappedWeapons.length + (hasDodge ? 1 : 0);
          // Position below the start battle button
          const startBtnYLocal = ibY + 105;
          const wpnStartY = startBtnYLocal + 60;
          ctx.font = "bold 14px sans-serif";

          ctx.shadowBlur = 4;
          ctx.textAlign = "center";
          for (let wi = 0; wi < wrappedWeapons.length; wi++) {
            ctx.fillText(wrappedWeapons[wi], W / 2, wpnStartY + wi * 20);
          }
          if (hasDodge) {
            ctx.shadowColor = "#4a8899";
            ctx.fillStyle = "#7ab8cc";
            ctx.font = "13px sans-serif";
            ctx.fillText("\u95EA\u907F\u9AB0\u5B50: " + this.darkRolandDodgeDice, W / 2, wpnStartY + wrappedWeapons.length * 20);
          }
          ctx.restore();
        }
        // Render speed dice animation — wrapped in try/catch to prevent errors from blocking buttons
        try {
        for (let i = 0; i < 2; i++) {
          const rx = px + 130 + i * 80, gx = px + 530 + i * 80, dy = baseY + 15;
          const isRedInf = b.crimsonSide === "red" && b.crimsonInfinity[i];
          const isGreenInf = b.crimsonSide === "green" && b.crimsonInfinity[i];
          if (spdElapsed < spdSpinEnd) {
            if (!isRedInf) this.drawCornerSpinDie(rx, dy, 52, b.rDice[i], redCol, spdElapsed);
            else this.drawInfinityDie(rx, dy, 52, "#ff0000");
            if (!isGreenInf) this.drawCornerSpinDie(gx, dy, 52, b.gDice[i], greenCol, spdElapsed);
            else this.drawInfinityDie(gx, dy, 52, "#ff0000");
          } else if (spdElapsed < spdBounceEnd) {
            const bounceP = (spdElapsed - spdSpinEnd) / SPD_BOUNCE_DUR;
            const diamondAngle = (1 - bounceP) * Math.PI / 4;
            const bounceY = -Math.sin(bounceP * Math.PI * 3) * 15 * (1 - bounceP);
            const drawBounceDie = (dx, ddy, isInf, dieVal, col2) => {
              ctx.save();
              ctx.translate(dx + 26, ddy + 26 + bounceY);
              ctx.rotate(diamondAngle);
              if (isInf) this.drawInfinityDie(-26, -26, 52, "#ff0000");
              else this.drawDie(-26, -26, 52, dieVal, col2);
              ctx.restore();
            };
            drawBounceDie(rx, dy, isRedInf, b.rDice[i], redCol);
            drawBounceDie(gx, dy, isGreenInf, b.gDice[i], greenCol);
          } else {
            if (isRedInf) this.drawInfinityDie(rx, dy, 52, "#ff0000");
            else this.drawDie(rx, dy, 52, b.rDice[i], redCol);
            if (isGreenInf) this.drawInfinityDie(gx, dy, 52, "#ff0000");
            else this.drawDie(gx, dy, 52, b.gDice[i], greenCol);
            const ay = dy + 70;
            const txtY = ay + 65 + i * 24;
            const rLabel = isRedInf ? "\u221E" : String(b.rDice[i]);
            const gLabel = isGreenInf ? "\u221E" : String(b.gDice[i]);
            const arrowAlpha = clamp((spdElapsed - spdBounceEnd) / SPD_ARROW_DUR, 0, 1);
            const infGreenIntercepts = b.crimsonInfinity[i] && b.crimsonSide === "green";
            const infRedIntercepts = b.crimsonInfinity[i] && b.crimsonSide === "red";
            if (infGreenIntercepts || !infRedIntercepts && b.rDice[i] > b.gDice[i]) {
              ctx.save();
              ctx.globalAlpha = arrowAlpha;
              ctx.strokeStyle = infGreenIntercepts ? "#ff0000" : "#c8a24e";
              ctx.lineWidth = 2;
              ctx.shadowColor = infGreenIntercepts ? "#ff0000" : "#c8a24e";
              ctx.shadowBlur = 6;
              ctx.setLineDash([6, 4]);
              const cpx = W / 2, cpy = ay + 100;
              const fromX = infGreenIntercepts ? gx + 26 : rx + 26;
              const toX = infGreenIntercepts ? rx + 26 : gx + 26;
              ctx.beginPath();
              ctx.moveTo(fromX, ay);
              ctx.quadraticCurveTo(cpx, cpy, toX, ay);
              ctx.stroke();
              ctx.setLineDash([]);
              const tdx1 = toX - cpx, tdy1 = ay - cpy;
              const tLen1 = Math.sqrt(tdx1 * tdx1 + tdy1 * tdy1);
              const tnx1 = tdx1 / tLen1, tny1 = tdy1 / tLen1;
              const aSize = 10;
              ctx.beginPath();
              ctx.moveTo(toX, ay);
              ctx.lineTo(toX - aSize * (tnx1 * 0.866 + tny1 * 0.5), ay - aSize * (tnx1 * 0.866 - tnx1 * 0.5));
              ctx.moveTo(toX, ay);
              ctx.lineTo(toX - aSize * (tnx1 * 0.866 - tny1 * 0.5), ay - aSize * (tnx1 * 0.866 + tnx1 * 0.5));
              ctx.stroke();
              ctx.restore();
              ctx.save();
              ctx.globalAlpha = arrowAlpha;
              ctx.font = `16px ${PF}`;
              ctx.fillStyle = infGreenIntercepts ? "#ff0000" : "#c8a24e";
              ctx.textAlign = "center";
              const arrowText = infGreenIntercepts ? `\u221E \u7EFF\u65B9\u81EA\u52A8\u62E6\u622A! \u7EA2\u65B9${rLabel}\u901F\u5EA6\u65E0\u6548, \u56FA\u5B9A+5` : `\u7EA2${rLabel} > \u7EFF${gLabel}${b.rBonus[i] > 0 ? " \u2192 \u62FC\u70B9+" + b.rBonus[i] : ""}`;
              ctx.fillText(arrowText, W / 2, txtY);
              ctx.restore();
            } else if (infRedIntercepts || !infGreenIntercepts && b.gDice[i] > b.rDice[i]) {
              ctx.save();
              ctx.globalAlpha = arrowAlpha;
              ctx.strokeStyle = infRedIntercepts ? "#ff0000" : "#8b0000";
              ctx.lineWidth = 2;
              ctx.shadowColor = infRedIntercepts ? "#ff0000" : "#8b0000";
              ctx.shadowBlur = 6;
              ctx.setLineDash([6, 4]);
              const cpx = W / 2, cpy = ay + 100;
              ctx.beginPath();
              ctx.moveTo(gx + 26, ay);
              ctx.quadraticCurveTo(cpx, cpy, rx + 26, ay);
              ctx.stroke();
              ctx.setLineDash([]);

    // ---- 殷红迷雾 Item Rendering ----

    // ---- 殷红迷雾 Glitch Subtitle Rendering ----
    renderCrimsonSubtitle(now) {
      if (!this.crimsonSubtitleText) return;
      const elapsed = now - this.crimsonSubtitleStart;
      if (elapsed > this.crimsonSubtitleDur) {
        this.crimsonSubtitleText = null;
        return;
      }
      const ctx = this.ctx;
      const fadeInEnd = this.crimsonSubtitleFadeIn;
      const fadeOutStart = this.crimsonSubtitleDur - this.crimsonSubtitleFadeOut;
      let alpha = 1;
      if (elapsed < fadeInEnd) alpha = elapsed / fadeInEnd;
      else if (elapsed > fadeOutStart) alpha = 1 - (elapsed - fadeOutStart) / this.crimsonSubtitleFadeOut;
      ctx.save();
      ctx.globalAlpha = alpha;
      const mw = 1e3, mh = 220;
      const mx = (W - mw) / 2, my = (H - mh) / 2 - 50;
      ctx.fillStyle = "rgba(20,0,0,0.9)";
      ctx.fillRect(mx, my, mw, mh);
      ctx.strokeStyle = "rgba(255,0,0," + 0.6 * alpha + ")";
      ctx.lineWidth = 2;
      ctx.strokeRect(mx, my, mw, mh);
      const glitchChars = "\u2588\u2593\u2592\u2591\u2554\u2557\u255A\u255D\u2551\u2550\u256C\u253C\u2524\u252C\u2534\u252C\u2590\u2584\u2580\u25A0\u25A1\u25AA\u25AB";
      let displayText = "";
      for (let i = 0; i < this.crimsonSubtitleText.length; i++) {
        if (Math.random() < 0.2) {
          displayText += glitchChars[Math.floor(Math.random() * glitchChars.length)];
        } else {
          displayText += this.crimsonSubtitleText[i];
        }
      }
      ctx.font = "bold 22px " + PF;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#ff0000";
      ctx.shadowColor = "#ff0000";
      ctx.shadowBlur = 10;
      const maxLineW = mw - 100;
      const lines = [];
      let curLine = "";
      for (let i = 0; i < displayText.length; i++) {
        const testLine = curLine + displayText[i];
        const tw = ctx.measureText(testLine).width;
        if (tw > maxLineW && curLine.length > 0) {
          lines.push(curLine);
          curLine = displayText[i];
        } else curLine = testLine;
      }
      if (curLine) lines.push(curLine);
      const lineH = 36;
      const startY = my + (mh - lines.length * lineH) / 2 - 10;
      for (let i = 0; i < lines.length; i++) {
        if (Math.random() < 0.1) {

          ctx.fillText(lines[i], W / 2 + (Math.random() - 0.5) * 4, startY + i * lineH);

          ctx.fillText(lines[i], W / 2, startY + i * lineH);
        }
      }
      ctx.shadowColor = "#ff0000";
      ctx.shadowBlur = 6;
      ctx.fillStyle = "#ff0000";
      ctx.font = "bold 24px " + PF;
      ctx.fillText("(" + this.crimsonCounter + "/" + CRIMSON_COUNTER_MAX + ")", W / 2, my + mh - 30);
      ctx.restore();

        const smokeCount = Math.floor(burnProg * 15) + 3;
        let sSeed = this.chesedTrustAnim.imgIdx * 7919;
        for (let i = 0; i < smokeCount; i++) {
          sSeed = (sSeed * 16807 + 12345) % 2147483647;
          const sx = (sSeed % 1e4 / 1e4 - 0.5) * imgW;
          sSeed = (sSeed * 16807 + 12345) % 2147483647;
          const sy = sSeed % 1e4 / 1e4 * imgH * 0.3 - imgH * 0.3;
          const sAlpha = burnProg * 0.3 * (0.5 + 0.5 * Math.sin(elapsed * 2e-3 + i));
          ctx.fillStyle = `rgba(70,130,180,${sAlpha})`;
          ctx.beginPath();
          ctx.arc(sx, sy, 8 + burnProg * 12, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
      if (burnProg > 0.1) {
        ctx.save();
        const sparkCount = Math.floor(burnProg * 25) + 3;
        let spSeed = this.chesedTrustAnim.imgIdx * 557 + Math.floor(elapsed / 80);
        for (let i = 0; i < sparkCount; i++) {
          spSeed = (spSeed * 16807 + 12345) % 2147483647;
          const baseX = (spSeed % 1e4 / 1e4 - 0.5) * imgW * scale;
          spSeed = (spSeed * 16807 + 12345) % 2147483647;
          const lifeOffset = spSeed % 1e3 / 1e3;
          const lifetime = 2e3 + lifeOffset * 2e3;
          const sparkElapsed = (elapsed + lifeOffset * 800) % lifetime;
          const life = sparkElapsed / lifetime;
          spSeed = (spSeed * 16807 + 12345) % 2147483647;
          const baseY = (spSeed % 1e4 / 1e4 - 0.5) * imgH * 0.8;
          const angle = life * Math.PI * 2;
          const dist = life * 40;
          const sparkX = baseX + Math.cos(angle) * dist;
          const sparkY = baseY - life * 60;
          const sparkA = (1 - life) * burnProg * 0.8;
          ctx.fillStyle = `rgba(100,160,210,${sparkA})`;
          ctx.shadowColor = glowColor;
          ctx.shadowBlur = 4;
          ctx.beginPath();
          ctx.arc(sparkX, sparkY, 2 + (1 - life) * 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
      ctx.restore();
      ctx.restore();
      if (alpha > 0.1) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.font = `bold 28px ${PF}`;
        ctx.fillStyle = glowColor;
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 10;
        ctx.fillText(this.chesedTrustAnim.name, cx, cy + imgH * scale / 2 + 15);
        ctx.restore();
      }
    }
    // ---- chesed companion markers rendering ----
    renderChesedCompanionMarkers(now) {
      if (!this.isChesedChar() || !this.hasChesedTrust("companion")) return;
      if (this.chesedCompanionMarkers.length === 0) return;
      const ctx = this.ctx;
      for (const m of this.chesedCompanionMarkers) {
        if (!m.alive) continue;
        const px = OX + m.x * CS + CS / 2;
        const py = OY + m.y * CS + CS / 2;
        const pulse = 0.5 + 0.5 * Math.sin(now / 400 + m.num);
        const isNext = m.num === this.chesedCompanionNextNum;
        const radius = CS / 3;
        ctx.save();
        if (isNext) {
          ctx.shadowColor = "#90EE90";
          ctx.shadowBlur = 12 + 6 * pulse;
          ctx.strokeStyle = "#90EE90";
          ctx.lineWidth = 2;
        } else {
          ctx.shadowColor = "rgba(100,160,100,0.5)";
          ctx.shadowBlur = 6;
          ctx.strokeStyle = "rgba(100,160,100,0.6)";
          ctx.lineWidth = 1.5;
        }
        ctx.fillStyle = isNext ? `rgba(144,238,144,${0.2 + 0.1 * pulse})` : "rgba(100,160,100,0.1)";
        ctx.beginPath();
        ctx.arc(px, py, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.font = `bold 14px ${PF}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = isNext ? "#90EE90" : "#607050";
        ctx.shadowBlur = isNext ? 6 : 0;
        ctx.fillText(`${m.num}`, px, py);
        ctx.restore();
      }
    }
    // ---- hokma guardian apostles rendering (white hexagrams) ----
    renderHokmaGuardians(now) {
      if (this.hokmaGuardians.length === 0) return;
      const ctx = this.ctx;
      for (let i = 0; i < this.hokmaGuardians.length; i++) {
        const g = this.hokmaGuardians[i];
        if (isNaN(g.x) || isNaN(g.y) || isNaN(g.prevX) || isNaN(g.prevY)) continue;
        const t = clamp((now - g.moveT) / PLAYER_MS, 0, 1);
        const gx = lerp(g.prevX, g.x, t) * CS + OX + CS / 2;
        const gy = lerp(g.prevY, g.y, t) * CS + OY + CS / 2;
        const pulse = 0.5 + 0.5 * Math.sin(now / 500 + i * Math.PI);
        ctx.save();
        const glowRadius = CS / 2.5;
        const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, glowRadius);
        grad.addColorStop(0, `rgba(255,255,255,${0.15 + 0.08 * pulse})`);
        grad.addColorStop(0.6, `rgba(200,200,220,${0.08 + 0.04 * pulse})`);
        grad.addColorStop(1, "rgba(200,200,220,0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(gx, gy, glowRadius, 0, Math.PI * 2);
        ctx.fill();
        const hexR = CS / 3 + 2 * pulse;
        ctx.strokeStyle = `rgba(255,255,255,${0.7 + 0.3 * pulse})`;
        ctx.lineWidth = 2;
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 8 + 4 * pulse;
        for (let tri = 0; tri < 2; tri++) {
          ctx.beginPath();
          for (let v = 0; v < 3; v++) {
            const angle = (v * 120 + tri * 60 - 90) * Math.PI / 180;
            const vx = gx + hexR * Math.cos(angle);
            const vy = gy + hexR * Math.sin(angle);
            if (v === 0) ctx.moveTo(vx, vy);
            else ctx.lineTo(vx, vy);
          }
          ctx.closePath();
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(gx, gy, hexR * 0.5, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${0.3 + 0.2 * pulse})`;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.font = `bold 10px ${PF}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = `rgba(255,255,255,${0.8 + 0.2 * pulse})`;
        ctx.shadowBlur = 4;
        ctx.fillText(`\u4F7F\u5F92${i + 1}`, gx, gy);
        for (let p = 0; p < 3; p++) {
          const particleAngle = (now / 1e3 + i * 2 + p * (Math.PI * 2 / 3)) % (Math.PI * 2);
          const particleDist = hexR + 6 + 4 * Math.sin(now / 300 + p);
          const ppx = gx + particleDist * Math.cos(particleAngle);
          const ppy = gy + particleDist * Math.sin(particleAngle);
          ctx.fillStyle = `rgba(255,255,255,${0.4 + 0.3 * Math.sin(now / 400 + p)})`;
          ctx.shadowBlur = 4;
          ctx.beginPath();
          ctx.arc(ppx, ppy, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }
    // ---- chesed trust HUD ----
    renderChesedTrustHUD(now) {
      if (!this.isChesedChar() || this.chesedTrusts.length === 0) return;
      if (!this.effectsPanelOpen) return;
      const ctx = this.ctx;
      ctx.save();
      ctx.font = "14px " + PF;
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      const trustIcons = { wisdom: "\u667A", warmth: "\u6696", companion: "\u4F34", powder: "\u7C89", falsegift: "\u4F2A" };
      const trustColors = { wisdom: "#4682B4", warmth: "#e8a87c", companion: "#90EE90", powder: "#FFB6C1", falsegift: "#DDA0DD" };
      let tx = 18;
      for (const t of this.chesedTrusts) {
        ctx.fillStyle = trustColors[t] || "#888";
        ctx.shadowColor = trustColors[t] || "#888";
        ctx.shadowBlur = 4;
        ctx.fillText(`[${trustIcons[t] || t}]`, tx, this._hudRow2Y);
        tx += ctx.measureText(`[${trustIcons[t] || t}]`).width + 12;
      }
      let bonusText = "";
      if (this.chesedWarmthBonus > 0) bonusText += `\u6696+${this.chesedWarmthBonus} `;
      if (this.chesedCompanionBonus > 0) bonusText += `\u4F34+${this.chesedCompanionBonus} `;
      if (this.chesedHasFalseGift) bonusText += "\u4F2A\u2713 ";
      if (this.chesedPowderUsed > 0) {
        const maxUses = this.chesedHasFalseGift ? 2 : 1;
        bonusText += `\u7C89${maxUses - this.chesedPowderUsed}/${maxUses} `;
      }
      if (bonusText) {
        const statusColor = "#4682B4";
        ctx.fillStyle = statusColor;
        ctx.shadowColor = statusColor;
        ctx.shadowBlur = 4;
        ctx.fillText(bonusText.trim(), tx + 5, this._hudRow2Y);
      }
      ctx.restore();
    }
    // ---- chesed effect trigger flash (brief notification at bottom of HUD) ----
    renderChesedFlash(now) {
      if (!this.chesedFlash) return;
      const elapsed = now - this.chesedFlash.start;
      if (elapsed > 2e3) {
        this.chesedFlash = null;
        return;
      }
      const ctx = this.ctx;
      ctx.save();
      let alpha;
      if (elapsed < 200) alpha = elapsed / 200;
      else if (elapsed > 1500) alpha = 1 - (elapsed - 1500) / 500;
      else alpha = 1;
      alpha = Math.max(0, Math.min(1, alpha));
      const slideY = Math.min(elapsed / 200, 1) * 20;
      const flashY = OY - 8 - slideY;
      ctx.globalAlpha = alpha;
      ctx.font = `bold 14px ${PF}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.fillStyle = this.chesedFlash.color;
      ctx.shadowColor = this.chesedFlash.color;
      ctx.shadowBlur = 8;
      ctx.fillText(this.chesedFlash.text, W / 2, flashY);
      ctx.restore();
    }
    // ---- Game Over / Curtain ----
    renderGameOver(now) {
      const ctx = this.ctx;
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      ctx.fillRect(0, 0, W, H);
      drawGothicBorder(ctx, W / 2 - 350, H / 2 - 200, 700, 400);
      const cy = H / 2 - 40;
      ctx.save();
      ctx.textAlign = "center";
      drawGothicCross(ctx, W / 2 - 220, cy, 20, GOTH.darkGold, 0.7);
      drawGothicCross(ctx, W / 2 + 220, cy, 20, GOTH.darkGold, 0.7);
      drawBaroqueScroll(ctx, W / 2 - 150, cy + 40, 300, GOTH.darkGold);
      const textY = cy - 30;
      if (this.phase === "won") {
        ctx.font = `bold 72px ${PF}`;
        ctx.fillStyle = "#ffd700";
        ctx.shadowColor = "#ffd700";
        ctx.shadowBlur = 25;
        ctx.fillText("\u2726 \u80DC\u5229 \u2726", W / 2, textY);
      } else {
        ctx.font = `bold 72px ${PF}`;
        ctx.fillStyle = "#cc0000";
        ctx.shadowColor = "#8b0000";
        ctx.shadowBlur = 25;
        ctx.fillText("\u271D \u5931\u8D25 \u271D", W / 2, textY);
        drawHexagram(ctx, W / 2 - 200, cy, 18, "#5a0000", 0.6);
        drawHexagram(ctx, W / 2 + 200, cy, 18, "#5a0000", 0.6);
      }
      ctx.restore();
      ctx.save();
      ctx.font = `bold 28px ${PF}`;
      ctx.textAlign = "center";
      ctx.fillStyle = "#b0a080";
      ctx.fillText(`\u603B\u5206\u6570: ${this.score} / ${this.totalPts}`, W / 2, cy + 55);
      ctx.fillStyle = this.phase === "won" ? "#ffd700" : "#8b0000";
      ctx.fillText(`\u80DC\u5229\u5206\u6570: ${Math.floor(this.totalPts / 2)}`, W / 2, cy + 90);
      if (this.phase === "lost") {
        ctx.fillStyle = "#6b0000";
        ctx.fillText(`\u8D85\u51FA\u4E0A\u9650 ${this.score - Math.floor(this.totalPts / 2)} \u5206`, W / 2, cy + 125);
      }
      ctx.restore();
      this.drawBtn({ x: W / 2 - 100, y: cy + 160, w: 200, h: 55, label: "\u27F3 RESTART", big: true });
    }
    renderCurtain(now) {
      const ctx = this.ctx;
      ctx.fillStyle = "rgba(10,3,3,0.95)";
      ctx.fillRect(0, 0, W, H);
      drawGothicBorder(ctx, W / 2 - 380, H / 2 - 180, 760, 380);
      const pulse = 0.5 + 0.5 * Math.sin(now / 400);
      ctx.save();
      ctx.strokeStyle = `rgba(139,0,0,${0.15 + 0.15 * pulse})`;
      ctx.lineWidth = 1;
      for (let i = 0; i < 20; i++) {
        const y = (now / 30 + i * 50) % H;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.restore();
      const cy = H / 2 - 30;
      ctx.save();
      ctx.textAlign = "center";
      ctx.font = `bold 80px ${PF}`;
      ctx.fillStyle = `rgba(180,${20 + 20 * pulse},0,${0.85 + 0.15 * pulse})`;
      ctx.shadowColor = "#8b0000";
      ctx.shadowBlur = 30 + 15 * pulse;
      ctx.fillText("\uFF1F\uFF1F\uFF1F\u821E\u53F0\u843D\u5E55", W / 2, cy);
      ctx.restore();
      drawGothicCross(ctx, W / 2 - 280, cy, 25, "#5a0000", 0.5);
      drawGothicCross(ctx, W / 2 + 280, cy, 25, "#5a0000", 0.5);
      drawBaroqueScroll(ctx, W / 2 - 180, cy + 30, 360, "#5a2a00");
      ctx.save();
      ctx.font = `bold 28px ${PF}`;
      ctx.textAlign = "center";
      ctx.fillStyle = "#8b4444";
      ctx.fillText("\u5206\u6570\u8D85\u8D8A\u4E86\u6781\u9650...", W / 2, cy + 80);
      ctx.fillStyle = "#6a5a50";
      ctx.fillText(`\u6700\u7EC8\u5206\u6570: ${this.score} / ${this.totalPts}`, W / 2, cy + 120);
      ctx.fillStyle = "#cc4444";
      ctx.fillText(`\u4E0A\u9650: ${Math.floor(this.totalPts / 2)} (\u8D85\u51FA ${this.score - Math.floor(this.totalPts / 2)} \u5206)`, W / 2, cy + 160);
      ctx.restore();
      this.drawBtn({ x: W / 2 - 100, y: H / 2 + 150, w: 200, h: 55, label: "\u27F3 RESTART", big: true });
    }
  };
  _Game.GOLD_SPAWN_INTERVAL = 500;
  _Game.GOLD_MID_Y = 0.5;
  let Game = _Game;


// ===== Auto-start =====
(function() {
  const canvas = document.getElementById('game');
  if (!canvas) return;
  try {
    const game = new Game(canvas);
    game.start();
  } catch (e) {
    console.error('Game init failed:', e);
    const ctx = canvas.getContext('2d');
    if (ctx) {
      ctx.fillStyle = '#080604';
      ctx.fillRect(0, 0, 1280, 900);
      ctx.fillStyle = '#c8a24e';
      ctx.font = '20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('游戏初始化失败 / Game Init Error', 640, 400);
      ctx.font = '14px sans-serif';
      ctx.fillStyle = '#ff6666';
      ctx.fillText(String(e), 640, 440);
    }
  }
})();
})();
</script>
